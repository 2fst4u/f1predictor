# f1pred configuration
# Linted and valid YAML.

app:
  model_version: "v1.1"
  random_seed: 42
  timezone: "UTC"
  live_refresh_seconds: 600
  log_level: "WARNING"  # DEBUG, INFO, WARNING, ERROR - reduces default verbosity

paths:
  cache_dir: "cache"

data_sources:
  jolpica:
    base_url: "https://api.jolpi.ca/ergast/f1"
    timeout_seconds: 30
    rate_limit_sleep: 0.5
    enabled: true
  fastf1:
    enabled: true
  open_meteo:
    forecast_url: "https://api.open-meteo.com/v1/forecast"
    historical_weather_url: "https://archive-api.open-meteo.com/v1/era5"
    historical_forecast_url: "https://historical-forecast-api.open-meteo.com/v1/forecast"
    geocoding_url: "https://geocoding-api.open-meteo.com/v1/search"
    enabled: true
    # Unit choices for Open-Meteo (see docs for acceptable values)
    temperature_unit: "celsius"        # celsius | fahrenheit
    windspeed_unit: "kmh"              # kmh | ms | mph | kn
    precipitation_unit: "mm"           # mm | inch

caching:
  requests_cache:
    backend: "sqlite"
    expire_after:
      forecast_hours: 6
      historical_days: 30
    allowable_codes: [200, 203, 206, 300, 301, 308]
    stale_if_error: true
  prediction_cache:
    max_entries: 50

modelling:
  # All model weights (blending, ensemble, DNF, simulation, recency,
  # Elo K) are dynamically calibrated at runtime via CalibrationManager.
  # Defaults live in f1pred/calibrate.py PARAM_DEFAULTS.
  # Delete calibration_weights.json to force full re-calibration.
  monte_carlo:
    draws: 5000
  features:
    include_fastf1_fill: true
    include_circuit_elevation: true
    include_weather_ensemble: true
  targets:
    session_types: ["qualifying", "race", "sprint_qualifying", "sprint"]
  simulation:
    max_penalty_base: 20.0   # DNF penalty ceiling (structural, not calibrated)
  dnf:
    clip_min: 0.02           # safety guardrail (not calibrated)
    clip_max: 0.35           # safety guardrail (not calibrated)
  ensemble:
    min_std: 0.05

calibration:
  enabled: true
  lookback_window_days: 1095  # 3 years
  frequency_hours: 24
  weights_file: "calibration_weights.json"

backtesting:
  enabled: true
  seasons: "auto"
  metrics: ["spearman", "kendall", "accuracy_top3", "brier_pairwise", "crps"]
