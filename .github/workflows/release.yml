name: "Release"

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  tests:
    name: "Tests"
    uses: ./.github/workflows/tests.yml

  release:
    name: "Release"
    needs: tests
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.next.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Get latest version tag
        id: latest
        run: |
          # Find the latest stable v*.*.* tag (exclude prereleases)
          LATEST=$(git tag -l 'v*.*.*' --sort=-v:refname | grep -v '-' | head -n 1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi
          echo "tag=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Latest tag: $LATEST"

      - name: Calculate next version
        id: next
        run: |
          LATEST="${{ steps.latest.outputs.tag }}"
          # Strip leading 'v'
          VERSION="${LATEST#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          BUMP="${{ github.event.inputs.bump }}"
          case "$BUMP" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEXT="v${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Next version: $NEXT (bump=$BUMP)"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.next.outputs.version }}" -m "Release ${{ steps.next.outputs.version }}"
          git push origin "${{ steps.next.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.next.outputs.version }}
          name: ${{ steps.next.outputs.version }}
          generate_release_notes: true

  build-release:
    name: "Build Release Image"
    needs: release
    uses: ./.github/workflows/build.yml
    with:
      is_release: true
      release_tag: ${{ needs.release.outputs.version }}
    permissions:
      contents: read
      packages: write
