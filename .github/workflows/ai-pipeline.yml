name: "AI Pipeline"

# ─────────────────────────────────────────────────────────────────────────────
# Multi-stage OpenCode pipeline
#
# Trigger:   Comment "/develop <task>" on any issue or PR
# Access:    Write/admin collaborators only (silent reject otherwise)
#
# Stage │ Purpose
# ──────┼────────────────────────────────
#   1   │ Classify + route
#   2   │ Task decomposition
#   3   │ Implement
#   4   │ Review + aggregate
#   5   │ Validate with repository CI commands
#   6   │ Fix failures
#   7   │ Summary + PR
# ─────────────────────────────────────────────────────────────────────────────

on:
  # New issue created with /develop in the body
  issues:
    types: [opened]
  # Comment posted on an existing issue or PR
  issue_comment:
    types: [created]
  # Line-level review comment on a PR
  pull_request_review_comment:
    types: [created]

# One pipeline per issue/PR at a time — never cancel in-flight runs
concurrency:
  group: ai-pipeline-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # GATE — auth check, context assembly, task extraction
  # ───────────────────────────────────────────────────────────────────────────
  gate:
    name: "Gate"
    runs-on: ubuntu-latest
    timeout-minutes: 3

    # Fires on:
    #   - issues: opened    when /develop appears in the new issue body
    #   - issue_comment     when /develop appears in a comment
    #   - pull_request_review_comment  same, but not on ai-pipeline/* branches
    # Strict command parsing (anchor check, not substring) is done in JS below.
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.body, '/develop')) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '/develop') &&
        !(github.event_name == 'pull_request_review_comment' &&
          startsWith(github.event.pull_request.head.ref, 'ai-pipeline/'))) ||
      (github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '/develop') &&
        !startsWith(github.event.pull_request.head.ref, 'ai-pipeline/'))

    permissions:
      contents: read
      issues: write        # needed to post the acknowledgement comment
      pull-requests: read

    outputs:
      task:         ${{ steps.context.outputs.task }}
      context_json: ${{ steps.context.outputs.context_json }}
      is_pr:        ${{ steps.context.outputs.is_pr }}
      issue_number: ${{ steps.context.outputs.issue_number }}
      thread_url:   ${{ steps.context.outputs.thread_url }}
      comment_id:   ${{ steps.ack.outputs.comment_id }}

    steps:
      # ── 1. Auth: only write/admin collaborators may trigger ────────────────
      - name: Check collaborator permission
        id: auth
        uses: actions/github-script@v7
        with:
          script: |
            // Actor differs by event type
            const actor = context.eventName === 'issues'
              ? context.payload.issue.user.login
              : context.payload.comment.user.login;
            let level;
            try {
              const resp = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                username: actor,
              });
              level = resp.data.permission; // admin | write | read | none
            } catch (e) {
              level = 'none';
            }
            const allowed = ['admin', 'write'].includes(level);
            if (!allowed) {
              core.notice(`@${actor} has permission '${level}' — /develop ignored`);
            }
            core.setOutput('allowed', String(allowed));
            core.setOutput('actor', actor);
            return allowed;

      - name: Abort if not authorised
        if: steps.auth.outputs.allowed != 'true'
        run: |
          echo "Unauthorised user — stopping pipeline."
          exit 1

      # ── 2 + 3. Extract task and assemble full context in one step ────────────
      # (context step follows — acknowledgement comment is posted after it
      #  so we can include the task text in the message)
      # Task resolution order:
      #   1. Text after /develop in the comment  (explicit override)
      #   2. Issue/PR title + body               (implicit — just comment /develop)
      # The full thread (all previous comments) is always included as context.
      - name: Extract task and assemble context
        id: context
        uses: actions/github-script@v7
        with:
          script: |
            const isPR   = !!context.payload.issue?.pull_request ||
                           context.eventName === 'pull_request_review_comment';
            const number = context.payload.issue?.number ||
                           context.payload.pull_request?.number;

            // ── Fetch issue / PR body ──────────────────────────────────────
            let title = '', issueBody = '', diff = '';
            if (isPR) {
              const pr = await github.rest.pulls.get({
                owner:       context.repo.owner,
                repo:        context.repo.repo,
                pull_number: number,
              });
              title     = pr.data.title;
              issueBody = pr.data.body || '';
              try {
                const diffResp = await github.rest.pulls.get({
                  owner:       context.repo.owner,
                  repo:        context.repo.repo,
                  pull_number: number,
                  mediaType:   { format: 'diff' },
                });
                diff = String(diffResp.data).slice(0, 20000);
              } catch (_) {}
            } else {
              const issue = await github.rest.issues.get({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: number,
              });
              title     = issue.data.title;
              issueBody = issue.data.body || '';
            }

            // ── Fetch all comments (up to 100) ─────────────────────────────
            const commentsResp = await github.rest.issues.listComments({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: number,
              per_page:     100,
            });
            const comments = commentsResp.data.map(c => ({
              author: c.user.login,
              body:   c.body.slice(0, 2000),
              at:     c.created_at,
            }));

            // ── Derive trigger body and actor (differs by event type) ────────
            // issues: opened  → body is the issue body; actor is the issue author
            // issue_comment   → body is the comment; actor is the commenter
            // pull_request_review_comment → same as issue_comment
            const isIssueOpen  = context.eventName === 'issues';
            const triggerBody  = isIssueOpen
              ? (context.payload.issue.body || '').replace(/\r\n/g, '\n').trim()
              : (context.payload.comment.body || '').replace(/\r\n/g, '\n').trim();
            const triggerActor = isIssueOpen
              ? context.payload.issue.user.login
              : context.payload.comment.user.login;

            // ── Verify /develop is at the start of the trigger text ───────────
            if (!/^\/develop(\s|$)/i.test(triggerBody)) {
              core.notice('/develop not at start of trigger body — skipping');
              return;
            }

            // ── Derive task ────────────────────────────────────────────────────
            // Everything after "/develop" is the inline task.
            // If nothing follows, fall back to issue title + body.
            const afterCommand = triggerBody.replace(/^\/develop\s*/i, '').trim();
            let task = '';
            if (afterCommand) {
              task = afterCommand;
            } else if (title || issueBody) {
              task = [title, issueBody].filter(Boolean).join('\n\n').trim();
            }

            if (!task) {
              core.setFailed(
                'No task found. Either add a description after /develop, ' +
                'or make sure the issue has a title and body.'
              );
              return;
            }

            task = task.slice(0, 4000);
            core.notice(`Task (first 200 chars): ${task.slice(0, 200)}`);

            // ── Assemble context JSON ──────────────────────────────────────────
            const url = isPR
              ? `https://github.com/${context.repo.owner}/${context.repo.repo}/pull/${number}`
              : `https://github.com/${context.repo.owner}/${context.repo.repo}/issues/${number}`;

            const ctx = JSON.stringify({
              repo:            `${context.repo.owner}/${context.repo.repo}`,
              number,
              is_pr:           isPR,
              title,
              body:            issueBody.slice(0, 8000),
              comments,
              pr_diff:         diff,
              trigger_comment: triggerBody,
              actor:           triggerActor,
            });

            core.setOutput('task',          task);
            core.setOutput('context_json',  ctx);
            core.setOutput('is_pr',         String(isPR));
            core.setOutput('issue_number',  isPR ? '' : String(number));
            core.setOutput('thread_url',    url);

      # ── 4. Post acknowledgement comment ───────────────────────────────────
      # Posted immediately so the user knows the pipeline is running.
      # The comment ID is stored as a job output so the summary job can
      # edit this same comment with the final result rather than posting a
      # second one.
      - name: Post acknowledgement comment
        id: ack
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.payload.issue?.number ||
                                 context.payload.pull_request?.number;
            const task   = `${{ steps.context.outputs.task }}`.slice(0, 300);
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;

            const body = [
              `⏳ **AI Pipeline started**`,
              ``,
              `**Task:** ${task}${task.length >= 300 ? '…' : ''}`,
              ``,
              `The pipeline is now running — this comment will be updated with the result.`,
              `[View live progress](${runUrl})`,
            ].join('\n');

            const resp = await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number,
              body,
            });
            core.setOutput('comment_id', String(resp.data.id));
            core.notice(`Acknowledgement posted — comment ID ${resp.data.id}`);

  # ───────────────────────────────────────────────────────────────────────────
  # STAGE 1 — CLASSIFY
  # Agent: classifier  (.opencode/agents/classifier.md)
  # Output artifact: classification.json
  # ───────────────────────────────────────────────────────────────────────────
  classify:
    name: "1 · Classify"
    needs: gate
    if: needs.gate.result == 'success' && needs.gate.outputs.task != ''
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
      id-token: write

    outputs:
      complexity:    ${{ steps.read.outputs.complexity }}
      escalate:      ${{ steps.read.outputs.escalate }}
      worker_count:  ${{ steps.read.outputs.worker_count }}
      domain:        ${{ steps.read.outputs.domain }}
      task_ids:      ${{ steps.read.outputs.task_ids }}

    steps:
      - name: Update progress
        uses: actions/github-script@v7
        with:
          script: |
            const commentId = parseInt('${{ needs.gate.outputs.comment_id }}');
            if (!commentId) return;
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const task   = `${{ needs.gate.outputs.task }}`.split('\n')[0].slice(0, 200);
            const body = [
              `⏳ **AI Pipeline — in progress**`,``,
              `**Task:** ${task}`,``,
              `⏳ Classify`,
              `· Plan`,
              `· Work`,
              `· Review`,
              `· Validate`,``,
              `[View live progress](${runUrl})`,
            ].join('\n');
            try { await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: commentId, body }); } catch(_) {}

      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run classifier
        uses: anomalyco/opencode/github@latest
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        with:
          model: openrouter/google/gemini-2.5-flash-lite
          agent: classifier
          share: true
          use_github_token: true
          prompt: |
            You are the CLASSIFY stage of a multi-stage AI pipeline.

            TASK FROM USER:
            ${{ needs.gate.outputs.task }}

            ISSUE/PR CONTEXT:
            ${{ needs.gate.outputs.context_json }}

            Based on the task and context above, write a JSON classification file to
            `/tmp/pipeline/classification.json`. Create the directory first with: mkdir -p /tmp/pipeline
            Do NOT explore the repository — the task text and context are sufficient.

            The JSON must follow this exact schema:
            {
              "complexity": "low" | "medium" | "high",
              "escalate": true | false,
              "domain": "core" | "data" | "infra" | "test" | "mixed",
              "worker_count": 1 | 2 | 3 | 4,
              "task_ids": ["t1", "t2", ...],
              "rationale": "one sentence explanation"
            }

            Rules:
            - escalate=true only when complexity="high" AND the task requires deep specialist expertise
            - worker_count must equal length of task_ids array (max 4)
            - task_ids are short identifiers like "t1", "t2", "t3", "t4"
            - domain="mixed" when task spans multiple areas
            - Write ONLY the JSON file. Do not edit any source files.

      - name: Read classification artifact
        id: read
        run: |
          FILE=/tmp/pipeline/classification.json
          if [ ! -f "$FILE" ]; then
            echo "::error::classifier did not write $FILE"
            exit 1
          fi
          cat "$FILE"
          python3 - <<'EOF'
          import json, os, sys
          with open('/tmp/pipeline/classification.json') as f:
              d = json.load(f)
          out = os.environ['GITHUB_OUTPUT']
          with open(out, 'a') as f:
              f.write(f"complexity={d['complexity']}\n")
              f.write(f"escalate={str(d.get('escalate', False)).lower()}\n")
              f.write(f"worker_count={min(int(d.get('worker_count', 1)), 4)}\n")
              f.write(f"domain={d.get('domain', 'mixed')}\n")
              f.write(f"task_ids={json.dumps(d.get('task_ids', ['t1']))}\n")
          print(f"complexity={d['complexity']} escalate={d.get('escalate')} workers={d.get('worker_count')} domain={d.get('domain')}")
          EOF

      - name: Upload classification
        uses: actions/upload-artifact@v4
        with:
          name: classification
          path: /tmp/pipeline/classification.json
          retention-days: 1

  # ───────────────────────────────────────────────────────────────────────────
  # STAGE 2 — PLAN
  # Agent: planner  (.opencode/agents/planner.md)
  # Output artifact: plan.json
  # ───────────────────────────────────────────────────────────────────────────
  plan:
    name: "2 · Plan"
    needs: [gate, classify]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
      id-token: write

    outputs:
      task_ids:  ${{ steps.read.outputs.task_ids }}
      plan_json: ${{ steps.read.outputs.plan_json }}

    steps:
      - name: Update progress
        uses: actions/github-script@v7
        with:
          script: |
            const commentId = parseInt('${{ needs.gate.outputs.comment_id }}');
            if (!commentId) return;
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const task   = `${{ needs.gate.outputs.task }}`.split('\n')[0].slice(0, 200);
            const body = [
              `⏳ **AI Pipeline — in progress**`,``,
              `**Task:** ${task}`,``,
              `✅ Classify`,
              `⏳ Plan`,
              `· Work`,
              `· Review`,
              `· Validate`,``,
              `[View live progress](${runUrl})`,
            ].join('\n');
            try { await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: commentId, body }); } catch(_) {}

      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Download classification
        uses: actions/download-artifact@v4
        with:
          name: classification
          path: /tmp/pipeline

      - name: Run planner
        uses: anomalyco/opencode/github@latest
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        with:
          model: openrouter/google/gemini-2.5-pro
          agent: planner
          share: true
          use_github_token: true
          prompt: |
            You are the PLAN stage of a multi-stage AI pipeline.

            TASK FROM USER:
            ${{ needs.gate.outputs.task }}

            ISSUE/PR CONTEXT:
            ${{ needs.gate.outputs.context_json }}

            CLASSIFICATION (from previous stage):
            $(cat /tmp/pipeline/classification.json)

            Explore the repository structure thoroughly (ls, find, cat key files), then write a
            detailed work plan to `/tmp/pipeline/plan.json`.

            The plan must be a JSON object with this exact schema:
            {
              "tasks": [
                {
                  "id": "t1",
                  "title": "short title",
                  "domain": "core" | "data" | "infra" | "test",
                  "agent": "worker-core" | "worker-data" | "worker-infra" | "worker-test",
                  "prompt": "Detailed, self-contained instructions for the worker. Name exact files, functions, line numbers. Describe before/after state clearly.",
                  "files": ["path/to/file.py", "tests/test_file.py"],
                  "acceptance": "Specific, testable criteria for completion"
                }
              ],
              "integration_notes": "How the tasks fit together once all workers are done"
            }

            Rules:
            - task_ids must match exactly: ${{ needs.classify.outputs.task_ids }}
            - Each task prompt must be fully self-contained — workers run in parallel and share no state
            - Reference actual files and functions by name — explore the repo first
            - Avoid assigning two workers to the same file (causes merge conflicts)
            - Write ONLY the JSON plan file. Do not edit any source files.

      - name: Read plan artifact
        id: read
        run: |
          FILE=/tmp/pipeline/plan.json
          if [ ! -f "$FILE" ]; then
            echo "::error::planner did not write $FILE"
            exit 1
          fi
          cat "$FILE"
          python3 - <<'EOF'
          import json, os
          with open('/tmp/pipeline/plan.json') as f:
              d = json.load(f)
          ids = [t['id'] for t in d['tasks']]
          out = os.environ['GITHUB_OUTPUT']
          with open(out, 'a') as f:
              f.write(f"task_ids={json.dumps(ids)}\n")
              f.write(f"plan_json={json.dumps(d)}\n")
          print(f"Planned {len(ids)} tasks: {ids}")
          EOF

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: plan
          path: /tmp/pipeline/plan.json
          retention-days: 1

  # ───────────────────────────────────────────────────────────────────────────
  # STAGE 3 — WORKER AGENTS (parallel matrix, up to 4)
  # Agent: worker-{domain}  (.opencode/agents/worker-*.md)
  # Output artifacts: patch-{id}.diff per worker
  # ───────────────────────────────────────────────────────────────────────────
  work:
    name: "3 · Work [${{ matrix.task_id }}]"
    needs: [gate, classify, plan]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false   # all workers run; aggregator handles partial results
      matrix:
        task_id: ${{ fromJson(needs.plan.outputs.task_ids) }}
    permissions:
      contents: read
      issues: write
      id-token: write

    outputs:
      # GitHub Actions matrix outputs — each worker sets these; last writer wins
      # (used only for share links; actual changes travel via patch artifacts)
      share_url: ${{ steps.worker.outputs.share_url }}

    steps:
      - name: Update progress
        # Only the first task in the matrix updates the comment to avoid races
        if: matrix.task_id == fromJson(needs.plan.outputs.task_ids)[0]
        uses: actions/github-script@v7
        with:
          script: |
            const commentId = parseInt('${{ needs.gate.outputs.comment_id }}');
            if (!commentId) return;
            const runUrl  = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const task    = `${{ needs.gate.outputs.task }}`.split('\n')[0].slice(0, 200);
            const workers = ${{ needs.classify.outputs.worker_count || 1 }};
            const body = [
              `⏳ **AI Pipeline — in progress**`,``,
              `**Task:** ${task}`,``,
              `✅ Classify`,
              `✅ Plan`,
              `⏳ Work (${workers} agent${workers > 1 ? 's' : ''} running in parallel)`,
              `· Review`,
              `· Validate`,``,
              `[View live progress](${runUrl})`,
            ].join('\n');
            try { await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: commentId, body }); } catch(_) {}

      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: plan
          path: /tmp/pipeline

      - name: Extract task prompt for this worker
        id: task
        run: |
          python3 - <<'EOF'
          import json, os
          with open('/tmp/pipeline/plan.json') as f:
              plan = json.load(f)
          task_id = os.environ['TASK_ID']
          task = next((t for t in plan['tasks'] if t['id'] == task_id), None)
          if not task:
              print(f"::error::Task {task_id} not found in plan")
              exit(1)
          out = os.environ['GITHUB_OUTPUT']
          with open(out, 'a') as f:
              f.write(f"agent={task['agent']}\n")
              # Write full prompt to file to avoid shell escaping issues
          with open('/tmp/pipeline/worker-prompt.txt', 'w') as f:
              f.write(task['prompt'])
          print(f"Task {task_id}: agent={task['agent']}")
          EOF
        env:
          TASK_ID: ${{ matrix.task_id }}

      - name: Snapshot repo state before worker
        run: git diff HEAD > /tmp/pipeline/before-${{ matrix.task_id }}.snap || true

      - name: Run worker agent
        id: worker
        uses: anomalyco/opencode/github@latest
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        with:
          model: ${{ needs.classify.outputs.escalate == 'true' && 'openrouter/anthropic/claude-opus-4.7' || 'openrouter/google/gemini-2.5-flash' }}
          # To change models: update the two model IDs above. The rest of the pipeline
          # adapts automatically — no agent prompts reference specific model names.
          agent: ${{ steps.task.outputs.agent }}
          share: true
          use_github_token: true
          prompt: |
            You are a WORKER AGENT in a multi-stage AI pipeline.
            Your task ID is: ${{ matrix.task_id }}

            ORIGINAL REQUEST FROM USER:
            ${{ needs.gate.outputs.task }}

            YOUR SPECIFIC TASK:
            $(cat /tmp/pipeline/worker-prompt.txt)

            IMPORTANT CONSTRAINTS:
            - Work only on the files listed in your task — other workers handle the rest
            - Do not modify files outside your task scope
            - After making changes, run the test suite to check for breakage:
              python -m pytest tests/ -x -q 2>&1 | head -50
            - Fix any test failures caused by your changes before finishing
            - Do not commit — the pipeline handles that

      - name: Capture changes as patch
        run: |
          mkdir -p /tmp/pipeline
          git diff HEAD > /tmp/pipeline/patch-${{ matrix.task_id }}.diff
          if [ -s /tmp/pipeline/patch-${{ matrix.task_id }}.diff ]; then
            echo "Worker ${{ matrix.task_id }} produced changes:"
            git diff HEAD --stat
          else
            echo "Worker ${{ matrix.task_id }} produced no file changes"
          fi

      - name: Upload patch
        uses: actions/upload-artifact@v4
        with:
          name: patch-${{ matrix.task_id }}
          path: /tmp/pipeline/patch-${{ matrix.task_id }}.diff
          retention-days: 1
          if-no-files-found: ignore

  # ───────────────────────────────────────────────────────────────────────────
  # STAGE 4 — AGGREGATE + REVIEW
  # Agent: aggregator  (.opencode/agents/aggregator.md)
  # Output artifact: aggregated-patch.diff + review.json
  # ───────────────────────────────────────────────────────────────────────────
  aggregate:
    name: "4 · Aggregate & Review"
    needs: [gate, classify, plan, work]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Run even if some workers failed — review partial results
    if: always() && needs.plan.result == 'success'
    permissions:
      contents: read
      issues: write
      id-token: write

    outputs:
      has_changes: ${{ steps.merge.outputs.has_changes }}

    steps:
      - name: Update progress
        uses: actions/github-script@v7
        with:
          script: |
            const commentId = parseInt('${{ needs.gate.outputs.comment_id }}');
            if (!commentId) return;
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const task   = `${{ needs.gate.outputs.task }}`.split('\n')[0].slice(0, 200);
            const body = [
              `⏳ **AI Pipeline — in progress**`,``,
              `**Task:** ${task}`,``,
              `✅ Classify`,
              `✅ Plan`,
              `✅ Work`,
              `⏳ Review`,
              `· Validate`,``,
              `[View live progress](${runUrl})`,
            ].join('\n');
            try { await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: commentId, body }); } catch(_) {}

      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Download all worker patches
        uses: actions/download-artifact@v4
        with:
          pattern: patch-*
          path: /tmp/pipeline/patches
          merge-multiple: true

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: plan
          path: /tmp/pipeline

      - name: Merge worker patches
        id: merge
        run: |
          mkdir -p /tmp/pipeline
          PATCHES=$(ls /tmp/pipeline/patches/patch-*.diff 2>/dev/null || true)
          if [ -z "$PATCHES" ]; then
            echo "No patches to merge."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Apply each patch, skipping empty ones
          APPLIED=0
          for patch in /tmp/pipeline/patches/patch-*.diff; do
            if [ -s "$patch" ]; then
              echo "Applying $patch..."
              git apply --whitespace=fix "$patch" && APPLIED=$((APPLIED + 1)) || \
                echo "::warning::Could not apply $patch cleanly — skipping"
            fi
          done

          echo "Applied $APPLIED patches"
          git diff HEAD > /tmp/pipeline/merged.diff

          if [ -s /tmp/pipeline/merged.diff ]; then
            git diff HEAD --stat
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run aggregator review agent
        if: steps.merge.outputs.has_changes == 'true'
        uses: anomalyco/opencode/github@latest
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        with:
          model: openrouter/openai/gpt-4.1
          agent: aggregator
          share: true
          use_github_token: true
          prompt: |
            You are the AGGREGATE & REVIEW stage of a multi-stage AI pipeline.
            Your job is to review the combined worker output critically and independently.

            ORIGINAL TASK:
            ${{ needs.gate.outputs.task }}

            PLAN THAT WAS EXECUTED:
            $(cat /tmp/pipeline/plan.json)

            COMBINED DIFF FROM ALL WORKERS:
            $(cat /tmp/pipeline/merged.diff)

            Your responsibilities:
            1. Read the merged diff carefully
            2. Check for bugs, logic errors, missing edge cases, security issues
            3. Check for style inconsistencies with the existing codebase
            4. Fix any issues you find directly in the files
            5. Write a review summary to `/tmp/pipeline/review.json`:
               {
                 "issues_found": ["description of each issue"],
                 "issues_fixed": ["description of each fix applied"],
                 "overall_quality": "good" | "acceptable" | "poor",
                 "summary": "one paragraph summary of the changes and your review"
               }

            Be thorough — you are the last AI check before tests run.
            If the code looks good, say so. Do not invent problems.

      - name: Capture final aggregated diff
        run: |
          git diff HEAD > /tmp/pipeline/aggregated.diff
          echo "has_changes=$([ -s /tmp/pipeline/aggregated.diff ] && echo true || echo false)" >> "$GITHUB_OUTPUT" || true

      - name: Upload aggregated artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aggregated
          path: |
            /tmp/pipeline/aggregated.diff
            /tmp/pipeline/review.json
          retention-days: 3
          if-no-files-found: ignore

  # ───────────────────────────────────────────────────────────────────────────
  # STAGE 5 — VALIDATE
  # No model — pure CI signals. ruff + pytest.
  # Output artifact: validation.json
  # ───────────────────────────────────────────────────────────────────────────
  validate:
    name: "5 · Validate"
    needs: [gate, classify, plan, aggregate]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: always() && needs.aggregate.result == 'success'
    permissions:
      contents: read
      issues: write

    outputs:
      passed:      ${{ steps.report.outputs.passed }}
      test_count:  ${{ steps.report.outputs.test_count }}
      fail_count:  ${{ steps.report.outputs.fail_count }}
      lint_issues: ${{ steps.report.outputs.lint_issues }}

    steps:
      - name: Update progress
        uses: actions/github-script@v7
        with:
          script: |
            const commentId = parseInt('${{ needs.gate.outputs.comment_id }}');
            if (!commentId) return;
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const task   = `${{ needs.gate.outputs.task }}`.split('\n')[0].slice(0, 200);
            const body = [
              `⏳ **AI Pipeline — in progress**`,``,
              `**Task:** ${task}`,``,
              `✅ Classify`,
              `✅ Plan`,
              `✅ Work`,
              `✅ Review`,
              `⏳ Validate`,``,
              `[View live progress](${runUrl})`,
            ].join('\n');
            try { await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: commentId, body }); } catch(_) {}

      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Detect repository validation commands
        id: detect
        shell: bash
        run: |
          python3 - <<'EOF'
          import json, os, pathlib

          root = pathlib.Path('.')

          def exists(name: str) -> bool:
              return (root / name).exists()

          def read_text(name: str) -> str:
              try:
                  return (root / name).read_text()
              except Exception:
                  return ''

          has_python = any(root.glob('**/*.py')) and (exists('pyproject.toml') or exists('requirements.txt') or exists('pytest.ini'))
          has_js = exists('package.json')
          has_go = exists('go.mod')
          has_rust = exists('Cargo.toml')
          tests_dir = exists('tests') or exists('test')
          makefile = read_text('Makefile')
          package_json = read_text('package.json')

          setup = []
          lint = []
          tests = []

          if 'test:' in makefile or '\ntest:' in makefile:
              tests.append('make test 2>&1 | tee /tmp/pipeline/pytest.txt || true')
          elif has_python:
              setup.append('python3 -m pip install --upgrade pip')
              if exists('requirements.txt'):
                  setup.append('pip install -r requirements.txt')
              setup.append('pip install ruff pytest pytest-json-report pytest-cov')
              if 'ruff' in read_text('pyproject.toml') or exists('.ruff.toml'):
                  lint.append('ruff check . --output-format=json --output-file=/tmp/pipeline/lint.json || true')
              else:
                  lint.append('printf "[]" > /tmp/pipeline/lint.json')
              if tests_dir:
                  tests.append('python3 -m pytest tests/ --tb=short --json-report --json-report-file=/tmp/pipeline/pytest.json -q 2>&1 | tee /tmp/pipeline/pytest.txt || true')
          elif has_js:
              setup.append('npm install')
              if '"lint"' in package_json:
                  lint.append('npm run lint > /tmp/pipeline/lint.json 2>&1 || true')
              else:
                  lint.append('printf "[]" > /tmp/pipeline/lint.json')
              if '"test"' in package_json:
                  tests.append('npm test > /tmp/pipeline/pytest.txt 2>&1 || true')
              else:
                  tests.append('printf "{}" > /tmp/pipeline/pytest.json && printf "No npm test script detected\n" > /tmp/pipeline/pytest.txt')
          elif has_go:
              lint.append('printf "[]" > /tmp/pipeline/lint.json')
              tests.append('go test ./... 2>&1 | tee /tmp/pipeline/pytest.txt || true')
          elif has_rust:
              lint.append('printf "[]" > /tmp/pipeline/lint.json')
              tests.append('cargo test 2>&1 | tee /tmp/pipeline/pytest.txt || true')

          data = {
              'has_python': has_python,
              'setup': ' && '.join(setup) if setup else 'true',
              'lint': lint[0] if lint else 'printf "[]" > /tmp/pipeline/lint.json',
              'tests': tests[0] if tests else 'printf "{}" > /tmp/pipeline/pytest.json && printf "No standard test command detected\n" > /tmp/pipeline/pytest.txt',
          }

          with open('/tmp/pipeline/detect.json', 'w') as f:
              json.dump(data, f)

          out = os.environ['GITHUB_OUTPUT']
          with open(out, 'a') as f:
              for key, value in data.items():
                  f.write(f"{key}={str(value).lower() if isinstance(value, bool) else value}\n")
          EOF

      - name: Install dependencies
        shell: bash
        run: ${{ steps.detect.outputs.setup }}

      - name: Download aggregated diff
        uses: actions/download-artifact@v4
        with:
          name: aggregated
          path: /tmp/pipeline
        continue-on-error: true

      - name: Apply aggregated changes
        run: |
          if [ -f /tmp/pipeline/aggregated.diff ] && [ -s /tmp/pipeline/aggregated.diff ]; then
            git apply --whitespace=fix /tmp/pipeline/aggregated.diff
            echo "Applied aggregated diff"
          else
            echo "No diff to apply — validating base code"
          fi

      - name: Lint with ruff
        id: lint
        continue-on-error: true
        shell: bash
        run: |
          ${{ steps.detect.outputs.lint }}
          ISSUES=$(python3 -c "
          import json
          try:
              d = json.load(open('/tmp/pipeline/lint.json'))
              print(len(d))
          except:
              print(0)
          ")
          echo "lint_issues=$ISSUES" >> "$GITHUB_OUTPUT"
          echo "Lint issues: $ISSUES"

      - name: Run tests
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          ${{ steps.detect.outputs.tests }}
          echo "test_exit=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Build validation report
        id: report
        run: |
          python3 - <<'EOF'
          import json, os

          # Parse pytest report
          passed = failed = 0
          failures = []
          try:
              r = json.load(open('/tmp/pipeline/pytest.json'))
              summary = r.get('summary', {}) if isinstance(r, dict) else {}
              passed = summary.get('passed', 0)
              failed = summary.get('failed', 0) + summary.get('error', 0)
              for t in r.get('tests', []):
                  if t['outcome'] in ('failed', 'error'):
                      failures.append({
                          'test': t['nodeid'],
                          'message': t.get('call', {}).get('longrepr', '')[:2000],
                      })
          except Exception as e:
              txt = ''
              try:
                  txt = open('/tmp/pipeline/pytest.txt').read()
              except Exception:
                  pass
              if 'FAILED' in txt or 'error:' in txt.lower() or 'Error:' in txt:
                  failed = 1
              failures.append({'test': 'parse_error', 'message': str(e)})

          # Parse lint report
          lint_issues = []
          try:
              lints = json.load(open('/tmp/pipeline/lint.json'))
              lint_issues = [
                  {'file': l['filename'], 'line': l['location']['row'],
                   'code': l['code'], 'message': l['message']}
                  for l in lints[:20]  # cap at 20
              ]
          except Exception:
              pass

          all_passed = failed == 0 and len(lint_issues) == 0

          report = {
              'passed':      all_passed,
              'test_passed': passed,
              'test_failed': failed,
              'lint_issues': len(lint_issues),
              'failures':    failures,
              'lint_details': lint_issues,
          }
          with open('/tmp/pipeline/validation.json', 'w') as f:
              json.dump(report, f, indent=2)

          out = os.environ['GITHUB_OUTPUT']
          with open(out, 'a') as f:
              f.write(f"passed={str(all_passed).lower()}\n")
              f.write(f"test_count={passed + failed}\n")
              f.write(f"fail_count={failed}\n")
              f.write(f"lint_issues={len(lint_issues)}\n")

          print(f"Validation: passed={all_passed} tests={passed}/{passed+failed} lint={len(lint_issues)}")
          EOF

      - name: Upload validation report
        uses: actions/upload-artifact@v4
        with:
          name: validation
          path: |
            /tmp/pipeline/validation.json
            /tmp/pipeline/pytest.json
            /tmp/pipeline/pytest.txt
            /tmp/pipeline/lint.json
          retention-days: 3

  # ───────────────────────────────────────────────────────────────────────────
  # STAGE 6 — FIX (feedback loop — only runs on validation failure)
  # Agent: fixer  (.opencode/agents/fixer.md)
  # ───────────────────────────────────────────────────────────────────────────
  fix:
    name: "6 · Fix"
    needs: [gate, classify, aggregate, validate]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: |
      needs.validate.result == 'success' &&
      needs.validate.outputs.passed == 'false'
    permissions:
      contents: read
      issues: write
      id-token: write

    outputs:
      fix_passed: ${{ steps.revalidate.outputs.passed }}

    steps:
      - name: Update progress
        uses: actions/github-script@v7
        with:
          script: |
            const commentId = parseInt('${{ needs.gate.outputs.comment_id }}');
            if (!commentId) return;
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const task   = `${{ needs.gate.outputs.task }}`.split('\n')[0].slice(0, 200);
            const body = [
              `⏳ **AI Pipeline — in progress**`,``,
              `**Task:** ${task}`,``,
              `✅ Classify`,
              `✅ Plan`,
              `✅ Work`,
              `✅ Review`,
              `⚠️ Validate (issues found — running fix)`,
              `⏳ Fix`,``,
              `[View live progress](${runUrl})`,
            ].join('\n');
            try { await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: commentId, body }); } catch(_) {}

      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Detect repository validation commands
        id: detect
        shell: bash
        run: |
          python3 - <<'EOF'
          import json, os, pathlib

          root = pathlib.Path('.')

          def exists(name: str) -> bool:
              return (root / name).exists()

          def read_text(name: str) -> str:
              try:
                  return (root / name).read_text()
              except Exception:
                  return ''

          has_python = any(root.glob('**/*.py')) and (exists('pyproject.toml') or exists('requirements.txt') or exists('pytest.ini'))
          has_js = exists('package.json')
          has_go = exists('go.mod')
          has_rust = exists('Cargo.toml')
          tests_dir = exists('tests') or exists('test')
          makefile = read_text('Makefile')
          package_json = read_text('package.json')

          setup = []
          lint = []
          tests = []

          if 'test:' in makefile or '\ntest:' in makefile:
              tests.append('make test 2>&1 | tee /tmp/pipeline/pytest2.txt || true')
          elif has_python:
              setup.append('python3 -m pip install --upgrade pip')
              if exists('requirements.txt'):
                  setup.append('pip install -r requirements.txt')
              setup.append('pip install ruff pytest pytest-json-report pytest-cov')
              if 'ruff' in read_text('pyproject.toml') or exists('.ruff.toml'):
                  lint.append('ruff check . --output-format=json --output-file=/tmp/pipeline/lint2.json || true')
              else:
                  lint.append('printf "[]" > /tmp/pipeline/lint2.json')
              if tests_dir:
                  tests.append('python3 -m pytest tests/ --tb=short --json-report --json-report-file=/tmp/pipeline/pytest2.json -q 2>&1 | tee /tmp/pipeline/pytest2.txt || true')
          elif has_js:
              setup.append('npm install')
              if '"test"' in package_json:
                  tests.append('npm test > /tmp/pipeline/pytest2.txt 2>&1 || true')
              else:
                  tests.append('printf "{}" > /tmp/pipeline/pytest2.json && printf "No npm test script detected\n" > /tmp/pipeline/pytest2.txt')
              if '"lint"' in package_json:
                  lint.append('npm run lint > /tmp/pipeline/lint2.json 2>&1 || true')
              else:
                  lint.append('printf "[]" > /tmp/pipeline/lint2.json')
          elif has_go:
              lint.append('printf "[]" > /tmp/pipeline/lint2.json')
              tests.append('go test ./... 2>&1 | tee /tmp/pipeline/pytest2.txt || true')
          elif has_rust:
              lint.append('printf "[]" > /tmp/pipeline/lint2.json')
              tests.append('cargo test 2>&1 | tee /tmp/pipeline/pytest2.txt || true')

          data = {
              'setup': ' && '.join(setup) if setup else 'true',
              'lint': lint[0] if lint else 'printf "[]" > /tmp/pipeline/lint2.json',
              'tests': tests[0] if tests else 'printf "{}" > /tmp/pipeline/pytest2.json && printf "No standard test command detected\n" > /tmp/pipeline/pytest2.txt',
          }

          out = os.environ['GITHUB_OUTPUT']
          with open(out, 'a') as f:
              for key, value in data.items():
                  f.write(f"{key}={value}\n")
          EOF

      - name: Install dependencies
        shell: bash
        run: ${{ steps.detect.outputs.setup }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "{aggregated,validation}"
          path: /tmp/pipeline
          merge-multiple: true

      - name: Apply aggregated changes
        run: |
          if [ -f /tmp/pipeline/aggregated.diff ] && [ -s /tmp/pipeline/aggregated.diff ]; then
            git apply --whitespace=fix /tmp/pipeline/aggregated.diff
          fi

      - name: Run fixer agent
        uses: anomalyco/opencode/github@latest
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        with:
          model: openrouter/openai/o4-mini
          agent: fixer
          share: true
          use_github_token: true
          prompt: |
            You are the FIX stage of a multi-stage AI pipeline.
            Previous AI stages made code changes, but validation FAILED. Your job is to fix all failures.

            ORIGINAL TASK:
            ${{ needs.gate.outputs.task }}

            VALIDATION REPORT (what failed):
            $(cat /tmp/pipeline/validation.json)

            PYTEST OUTPUT:
            $(cat /tmp/pipeline/pytest.txt 2>/dev/null | head -200)

            CURRENT CODE STATE (diff from original):
            $(cat /tmp/pipeline/aggregated.diff | head -500)

            Instructions:
            1. Read the validation report carefully — understand WHY each test failed
            2. Read the relevant source files and tests to understand the full context
            3. Fix all failing tests and lint issues
            4. After fixing, run the test suite and lint to verify:
               python -m pytest tests/ -x -q 2>&1 | head -100
               ruff check . 2>&1 | head -50
            5. If issues remain, keep fixing until clean (or until you have exhausted reasonable approaches)
            6. Do not revert the original intent of the changes — fix the implementation, not the goal

      - name: Re-run validation after fix
        id: revalidate
        continue-on-error: true
        shell: bash
        run: |
          ${{ steps.detect.outputs.lint }}
          ${{ steps.detect.outputs.tests }}

          python3 - <<'EOF'
          import json, os
          try:
              r = json.load(open('/tmp/pipeline/pytest2.json'))
              summary = r.get('summary', {}) if isinstance(r, dict) else {}
              failed = summary.get('failed', 0) + summary.get('error', 0)
          except:
              failed = 0
              try:
                  txt = open('/tmp/pipeline/pytest2.txt').read()
                  if 'FAILED' in txt or 'error:' in txt.lower() or 'Error:' in txt:
                      failed = 1
              except Exception:
                  failed = 1
          try:
              l = json.load(open('/tmp/pipeline/lint2.json'))
              lint = len(l)
          except:
              lint = 0
          passed = failed == 0 and lint == 0
          out = os.environ['GITHUB_OUTPUT']
          with open(out, 'a') as f:
              f.write(f"passed={str(passed).lower()}\n")
              f.write(f"fail_count={failed}\n")
              f.write(f"lint_issues={lint}\n")
          print(f"Re-validation: passed={passed} failed={failed} lint={lint}")
          EOF

      - name: Capture fix patch
        run: |
          git diff HEAD > /tmp/pipeline/fix.diff

      - name: Upload fix artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fix
          path: |
            /tmp/pipeline/fix.diff
            /tmp/pipeline/pytest2.json
            /tmp/pipeline/pytest2.txt
            /tmp/pipeline/lint2.json
          retention-days: 3
          if-no-files-found: ignore

  # ───────────────────────────────────────────────────────────────────────────
  # STAGE 7 — SUMMARY + PR
  # No model — uses gh CLI.
  # Posts structured comment on the triggering issue/PR.
  # Opens a PR on a new branch (always, even on partial failure).
  # ───────────────────────────────────────────────────────────────────────────
  summary:
    name: "7 · Summary & PR"
    needs: [gate, classify, plan, aggregate, validate, fix]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: always() && needs.gate.result == 'success' && needs.gate.outputs.task != ''
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/pipeline/all
          merge-multiple: true
        continue-on-error: true

      - name: Apply final changes and create branch
        id: branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="ai-pipeline/run-${{ github.run_id }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          # Apply fix patch first (superset of aggregated), else fall back to aggregated
          APPLIED=false
          for diff in /tmp/pipeline/all/fix.diff /tmp/pipeline/all/aggregated.diff; do
            if [ -f "$diff" ] && [ -s "$diff" ]; then
              git apply --whitespace=fix "$diff" && APPLIED=true && echo "Applied $diff" && break
            fi
          done

          if [ "$APPLIED" = "true" ]; then
            if ! git diff --quiet; then
              git add -A
              git commit -m "ai-pipeline: ${{ needs.gate.outputs.task }}" \
                -m "Run: ${{ github.run_id }} | Complexity: ${{ needs.classify.outputs.complexity }} | Domain: ${{ needs.classify.outputs.domain }}"
              git push origin "$BRANCH"
              echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
              echo "has_changes=true" >> "$GITHUB_OUTPUT"
            else
              echo "has_changes=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open pull request
        id: pr
        if: steps.branch.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VALIDATE_STATUS="${{ needs.validate.outputs.passed }}"
          FIX_STATUS="${{ needs.fix.outputs.fix_passed }}"

          if [ "$VALIDATE_STATUS" = "true" ]; then
            STATUS_BADGE="✅ Tests passing"
          elif [ "$FIX_STATUS" = "true" ]; then
            STATUS_BADGE="✅ Tests passing (after fix)"
          else
            STATUS_BADGE="⚠️ Tests failing — review required"
          fi

          # Closing keyword: only added when triggered from an issue (not a PR comment).
          # GitHub auto-closes the issue when this PR is merged.
          ISSUE_NUMBER="${{ needs.gate.outputs.issue_number }}"
          if [ -n "$ISSUE_NUMBER" ]; then
            CLOSES_LINE="Closes #${ISSUE_NUMBER}"
          else
            CLOSES_LINE=""
          fi

          PR_URL=$(gh pr create \
            --title "ai-pipeline: ${{ needs.gate.outputs.task }}" \
            --body "## AI Pipeline Output

          **Triggered by:** ${{ needs.gate.outputs.thread_url }}
          **Run:** [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          **Status:** $STATUS_BADGE

          ### Pipeline stages
          | Stage | Escalated |
          |-------|-----------|
          | Classify | — |
          | Plan | — |
          | Work | ${{ needs.classify.outputs.escalate == 'true' && 'yes' || 'no' }} |
          | Review | — |
          | Fix (if needed) | — |

          ### Validation
          - Tests: ${{ needs.validate.outputs.test_count }} run, ${{ needs.validate.outputs.fail_count }} failed
          - Lint: ${{ needs.validate.outputs.lint_issues }} issue(s)

          ${CLOSES_LINE}

          ---
          *Generated by the [AI Pipeline](${{ github.server_url }}/${{ github.repository }}/actions/workflows/ai-pipeline.yml)*" \
            --head "${{ steps.branch.outputs.branch }}" \
            --base "${{ github.event.repository.default_branch }}" 2>&1)
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "PR: $PR_URL"

      - name: Update acknowledgement comment with final result
        uses: actions/github-script@v7
        env:
          VALIDATE_PASSED: ${{ needs.validate.outputs.passed }}
          FIX_PASSED:      ${{ needs.fix.outputs.fix_passed }}
          FIX_RESULT:      ${{ needs.fix.result }}
          HAS_CHANGES:     ${{ steps.branch.outputs.has_changes }}
          PR_URL:          ${{ steps.pr.outputs.pr_url }}
          CLASSIFY_RESULT: ${{ needs.classify.result }}
          PLAN_RESULT:     ${{ needs.plan.result }}
          AGG_RESULT:      ${{ needs.aggregate.result }}
        with:
          script: |
            const issue_number = context.payload.issue?.number ||
                                 context.payload.pull_request?.number;
            const commentId  = '${{ needs.gate.outputs.comment_id }}';
            const task        = `${{ needs.gate.outputs.task }}`.slice(0, 300);
            const runUrl      = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const prUrl       = process.env.PR_URL || '';
            const hasChanges  = process.env.HAS_CHANGES === 'true';

            const validatePassed = process.env.VALIDATE_PASSED === 'true';
            const fixPassed      = process.env.FIX_PASSED      === 'true';
            const fixRan         = process.env.FIX_RESULT       === 'success';
            const classifyOk     = process.env.CLASSIFY_RESULT  === 'success';
            const planOk         = process.env.PLAN_RESULT       === 'success';
            const aggOk          = process.env.AGG_RESULT        === 'success';

            // Determine overall outcome — expressed in plain terms, no test/lint details
            // (those live on the PR, not the issue)
            let statusLine, detail;
            if (!classifyOk || !planOk) {
              statusLine = '❌ **Could not start work**';
              detail = 'The pipeline failed to understand or plan the task. Check the [run logs](' + runUrl + ') for details.';
            } else if (!aggOk) {
              statusLine = '❌ **Development failed**';
              detail = 'The worker stage encountered an error. Check the [run logs](' + runUrl + ') for details.';
            } else if (!hasChanges) {
              statusLine = '❌ **No changes produced**';
              detail = 'The pipeline ran but did not generate any code changes. The task may be ambiguous or already complete.';
            } else if (validatePassed || (fixRan && fixPassed)) {
              statusLine = '✅ **Done**';
              detail = prUrl
                ? `Changes are ready for review in ${prUrl}`
                : 'Changes were made but no pull request was opened.';
            } else {
              statusLine = '⚠️ **Changes made — needs review**';
              detail = prUrl
                ? `A pull request has been opened but some checks did not pass. See ${prUrl} for details.`
                : 'Changes were made but some checks did not pass. Check the [run logs](' + runUrl + ').';
            }

            const lines = [
              statusLine,
              ``,
              detail,
              ``,
              prUrl ? `**Pull request:** ${prUrl}` : '',
              `**Run:** [View full logs](${runUrl})`,
            ].filter(l => l !== '').join('\n');

            // Post a NEW comment so issue followers get notified of the outcome.
            // The in-progress acknowledgement comment is then deleted — it has
            // served its purpose and would otherwise clutter the thread.
            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number,
              body:         lines,
            });
            core.notice('Final result comment posted');

            // Delete the in-progress acknowledgement comment
            if (commentId) {
              try {
                await github.rest.issues.deleteComment({
                  owner:      context.repo.owner,
                  repo:       context.repo.repo,
                  comment_id: parseInt(commentId),
                });
                core.notice(`Deleted in-progress acknowledgement comment ${commentId}`);
              } catch (e) {
                core.warning(`Could not delete acknowledgement comment: ${e.message}`);
              }
            }
