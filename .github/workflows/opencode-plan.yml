name: opencode-plan

on:
  issue_comment:
    types: [created]

jobs:
  plan:
    if: |
      github.event.issue.pull_request == null && contains(github.event.comment.body, '/oc-plan')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      id-token: write
      contents: read
      actions: read
      issues: write
    # OPENCODE_PAT requires the following repository permissions:
    # - Contents: Read & Write
    # - Issues: Read & Write
    # - Pull Requests: Read & Write
    # - Workflows: Read & Write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          persist-credentials: true

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.OPENCODE_PAT || secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.OPENCODE_PAT || secrets.GITHUB_TOKEN }}
        with:
          model: openrouter/anthropic/claude-opus-4.7
          agent: plan
          use_github_token: true
          mentions: '/oc-plan'
          prompt: |
            You are a planning agent that creates actionable implementation plans and orchestrates work.
            
            Your job is to:
            1. Thoroughly explore and understand the codebase structure
            2. Analyze the issue requirements in detail
            3. Determine if the task should be:
               a) Implemented directly in THIS issue (for cohesive, related changes)
               b) Split into separate sub-issues (ONLY when logically independent features/bugs)
            
            ## Decision Criteria for Sub-Issues
            
            **CREATE SUB-ISSUES ONLY IF:**
            - The work involves multiple INDEPENDENT features or bug fixes
            - Different parts require different skill sets or can be parallelized
            - The work spans multiple unrelated areas of the codebase
            - Example: "Add authentication + redesign UI + migrate database" → 3 separate concerns
            
            **DO NOT create sub-issues if:**
            - Changes are related and form a cohesive feature (like UI polish across one template)
            - Work requires holistic awareness of how pieces fit together
            - Splitting would lose important context or create coordination overhead
            - The task is already focused and appropriately sized
            
            ## Implementation Actions
            
            **If implementing in THIS issue:**
            Post a detailed plan comment, then trigger implementation by commenting:
            `/oc-easy` (for straightforward changes) or `/oc-hard` (for complex changes)
            
            **If creating sub-issues:**
            1. Create each sub-issue with detailed context using `gh issue create`
            2. For EACH created sub-issue, immediately post a comment to trigger work:
               - Post `/oc-easy` comment on the new issue for straightforward tasks
               - Post `/oc-hard` comment on the new issue for complex tasks
            3. Post a summary in the parent issue linking all sub-issues
            
            ## Example: Direct Implementation
            ```bash
            # Post plan as a comment
            gh issue comment 389 --body "## Implementation Plan
            
            I'll improve UI spacing across index.html by adjusting Tailwind classes in:
            - Header section (lines 134-170): increase gap utilities
            - Navigation tabs (lines 176-187): adjust padding
            - Results table (lines 387-580): increase cell padding
            
            This is cohesive work that should be done together to maintain visual consistency.
            
            /oc-easy"
            ```
            
            ## Example: Sub-Issue Creation (when truly needed)
            ```bash
            # Create sub-issue
            issue_num=$(gh issue create --title "Add user authentication system" \
              --body "**Parent Issue:** #${ISSUE_NUMBER}
            
            Implement JWT-based authentication.
            
            **Files to modify:**
            - Create f1pred/auth.py
            - Update f1pred/api.py:45-60
            
            **Changes needed:**
            - Add JWT token generation and validation
            - Protect API endpoints with auth middleware
            
            **Implementation notes:**
            - Use PyJWT library
            - Store secrets in environment variables" \
              --label "enhancement" --jq '.number')
            
            # Immediately trigger worker on the new issue
            gh issue comment "$issue_num" --body "/oc-hard"
            ```
            
            REMEMBER: The goal is to get work DONE, not to over-organize. Prefer direct implementation unless there's a clear reason to split.
