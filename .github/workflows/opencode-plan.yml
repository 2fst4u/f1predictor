name: opencode-plan

on:
  issue_comment:
    types: [created]

jobs:
  plan:
    if: |
      github.event.issue.pull_request == null && contains(github.event.comment.body, '/oc-plan')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      id-token: write
      contents: read
      actions: read
      issues: write
    # OPENCODE_PAT requires the following repository permissions:
    # - Contents: Read & Write
    # - Issues: Read & Write
    # - Pull Requests: Read & Write
    # - Workflows: Read & Write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          persist-credentials: true

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.OPENCODE_PAT || secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.OPENCODE_PAT || secrets.GITHUB_TOKEN }}
        with:
          model: openrouter/google/gemini-2.5-pro
          agent: plan
          use_github_token: true
          mentions: '/oc-plan'
          prompt: |
            You are a planning agent that decomposes tasks into concrete, actionable work.
            
            Your job is to:
            1. Thoroughly explore and understand the codebase structure
            2. Analyze the issue requirements in detail
            3. Create a detailed, file-specific implementation plan
            4. Break down complex tasks into smaller sub-issues if needed
            5. For EACH actionable task, create a NEW GitHub issue with:
               - Clear title describing the specific task
               - Detailed description with file paths and line numbers
               - Implementation approach and considerations
               - Label it appropriately (e.g., "enhancement", "bug", "refactor")
               - Reference the parent issue number
            
            IMPORTANT: 
            - DO NOT just summarize what needs to be done
            - DO NOT provide analysis without action
            - DO create actual GitHub issues for each task using the `gh` command
            - Each sub-issue should be small enough for a worker agent to complete
            - Include a comment in THIS issue summarizing the plan and linking to the created sub-issues
            
            Example workflow:
            ```bash
            # Create a sub-issue for each distinct task
            gh issue create --title "Update header spacing in index.html" \
              --body "**Parent Issue:** #389

            Adjust spacing in the header section to improve readability.
            
            **Files to modify:**
            - f1pred/templates/index.html:134-170
            
            **Changes needed:**
            - Increase gap between version numbers and refresh button
            - Add consistent spacing between header elements
            
            **Implementation notes:**
            - Use Tailwind gap and space-x utilities
            - Test on mobile and desktop viewports" \
              --label "enhancement"
            ```
            
            After creating all sub-issues, post a summary comment explaining the breakdown.
