name: opencode-plan

on:
  issue_comment:
    types: [created]

jobs:
  plan:
    if: |
      github.event.issue.pull_request == null && contains(github.event.comment.body, '/oc-plan')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      id-token: write
      contents: read
      actions: read
      issues: write
    # OPENCODE_PAT requires the following repository permissions:
    # - Contents: Read & Write
    # - Issues: Read & Write
    # - Pull Requests: Read & Write
    # - Workflows: Read & Write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          persist-credentials: true

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.OPENCODE_PAT || secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.OPENCODE_PAT || secrets.GITHUB_TOKEN }}
        with:
          model: openrouter/google/gemini-2.5-pro
          agent: plan
          use_github_token: true
          mentions: '/oc-plan'
