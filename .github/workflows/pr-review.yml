name: "PR Review"

# Automatic code review on every push to a PR branch. Lives in its own
# workflow (separate from build.yml) so push-triggered runs don't have
# a skipped review job and pull_request runs don't have skipped tests/build.
#
# The OpenCode GitHub action does not support 'push' events. The
# 'synchronize' type fires on every push to a PR branch, so reviewing on
# pull_request gives equivalent coverage to reviewing on push.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    name: "Code Review"
    runs-on: ubuntu-latest
    concurrency:
      group: oc-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      id-token: write
      contents: read
      actions: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          persist-credentials: true
          token: ${{ secrets.OPENCODE_PAT || secrets.GITHUB_TOKEN }}

      - name: Run review
        uses: anomalyco/opencode/github@latest
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.OPENCODE_PAT || secrets.GITHUB_TOKEN }}
        with:
          model: openrouter/openai/gpt-5.4
          use_github_token: true
          prompt: |
            You are a senior software engineer performing a thorough code review on this pull request.
            Review the diff carefully and produce a structured review using the sections below.
            For each section, list specific findings with file paths and line numbers. If a section has no findings, write "No issues found." and move on — do NOT pad sections with filler.

            ## Review Sections

            Structure your review comment with these markdown headings:

            ### 🐛 Correctness & Bugs
            Logic errors, off-by-one mistakes, race conditions, incorrect API usage,
            unhandled edge cases, null/None dereference risks, type mismatches.

            ### 🔒 Security
            Injection vulnerabilities, secrets/credentials in code, missing input
            validation, insecure defaults, dependency vulnerabilities, improper
            error exposure.

            ### ⚡ Performance
            Unnecessary allocations, N+1 queries, missing caching opportunities,
            blocking I/O on hot paths, algorithmic complexity concerns.

            ### 🏗️ Design & Maintainability
            SOLID violations, code duplication, poor naming, overly complex logic,
            missing abstractions, tight coupling, dead code.

            ### 🧪 Testing
            Missing test coverage for new/changed behaviour, brittle tests, missing
            edge case tests, test hygiene issues (e.g. hardcoded values, flaky assertions).

            ### 📖 Documentation
            Missing or outdated docstrings, unclear comments, missing CHANGELOG or
            README updates for user-facing changes, undocumented config/env variables.

            ### 💡 Suggestions & Nits
            Style preferences, minor improvements, or nice-to-haves that do NOT
            block merging.

            ## Verdict

            End your review with exactly one of the following verdicts:

            **✅ Verdict: Non-blocking** — The PR is safe to merge. Any findings above
            are minor suggestions that the author can address at their discretion.

            **🚫 Verdict: Blocking** — The PR has issues that MUST be fixed before
            merging. When you give this verdict you MUST also trigger an automated
            fix by posting a comment on the PR using `gh`. Choose the appropriate
            worker based on fix complexity:
            - `/oc-easy` for straightforward, well-scoped fixes (typos, missing
              validation, small logic fixes)
            - `/oc-hard` for complex fixes requiring multi-file changes,
              architectural adjustments, or new tests

            The fix instructions must be specific and actionable, referencing exact
            files, line numbers, and what to change.

            Example — simple fix:
            ```bash
            gh pr comment $PR_NUMBER --body "/oc-easy Fix the off-by-one error in
            f1pred/engine.py:142 where range(len(drivers)) should be
            range(len(drivers) - 1), and add a regression test in
            tests/test_engine.py."
            ```

            Example — complex fix:
            ```bash
            gh pr comment $PR_NUMBER --body "/oc-hard The new caching layer in
            f1pred/cache.py has no TTL expiration and will leak memory. Add a
            max-age eviction policy, update config.yaml with a cache_ttl_seconds
            option, and add integration tests in tests/test_cache.py covering
            expiration and invalidation."
            ```

            ## Guidelines
            - Be constructive, specific, and concise.
            - Cite file paths and line numbers for every finding.
            - Do NOT nitpick formatting if a linter/formatter handles it.
            - Weigh severity: not every imperfection is blocking.
            - A blocking verdict should only be given for correctness bugs,
              security issues, data loss risks, or egregious design problems —
              not for style preferences.

      - name: Check review verdict
        env:
          GH_TOKEN: ${{ secrets.OPENCODE_PAT || secrets.GITHUB_TOKEN }}
        run: |
          # Find the most recent comment containing a verdict
          VERDICT=$(gh api \
            "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq '[.[] | select(.body | test("Verdict:"))] | last | .body' \
            | grep -oP "Verdict: \K[A-Za-z-]+" | tail -1)

          echo "Review verdict: $VERDICT"

          if [ "$VERDICT" = "Blocking" ]; then
            echo "::error::Code review is BLOCKING. The review bot has posted fix instructions on the PR."
            exit 1
          fi

          echo "✅ Review passed"
