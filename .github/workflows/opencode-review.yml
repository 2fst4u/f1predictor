name: opencode-review

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      actions: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          persist-credentials: true

      - uses: anomalyco/opencode/github@latest
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: openrouter/anthropic/claude-3.7-sonnet
          use_github_token: true
          prompt: |
            Review this pull request as an expert software engineer:
            - Identify critical security vulnerabilities or bugs.
            - Highlight performance bottlenecks.
            - Point out maintainability issues or violations of best practices.
            - Be highly specific and provide actionable suggestions.
            - Ensure feedback is constructive and concise.
            - If needed, instruct the author they can trigger further changes by commenting "/oc-easy <instructions>" or "/oc-hard <instructions>" on your review comments.
