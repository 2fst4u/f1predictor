name: opencode-hard

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: |
      contains(github.event.comment.body, '/oc-hard')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      id-token: write
      contents: write
      actions: read
      pull-requests: write
      issues: write
    # OPENCODE_PAT requires the following repository permissions:
    # - Contents: Read & Write
    # - Issues: Read & Write
    # - Pull Requests: Read & Write
    # - Workflows: Read & Write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1
          persist-credentials: true
          token: ${{ secrets.OPENCODE_PAT || secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.OPENCODE_PAT || secrets.GITHUB_TOKEN }}
        with:
          model: openrouter/anthropic/claude-opus-4.7
          agent: worker-hard
          use_github_token: true
          mentions: '/oc-hard'
