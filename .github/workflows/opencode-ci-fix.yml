name: opencode-ci-fix

on:
  workflow_run:
    workflows: ["Build"]
    types: [completed]

jobs:
  fix:
    # Only run when the build failed and was triggered by a push (not a release)
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      pull-requests: write
      issues: write
    steps:
      - name: Find associated PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.OPENCODE_PAT || secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "${{ github.event.workflow_run.head_branch }}" \
            --state open \
            --json number \
            --jq '.[0].number // empty')
          echo "number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Check commit author (loop prevention)
        if: steps.pr.outputs.number != ''
        id: guard
        run: |
          AUTHOR="${{ github.event.workflow_run.head_commit.author.name }}"
          if [ "$AUTHOR" = "github-actions[bot]" ]; then
            echo "is_bot=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_bot=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Identify failed job
        if: steps.pr.outputs.number != ''
        id: failed
        env:
          GH_TOKEN: ${{ secrets.OPENCODE_PAT || secrets.GITHUB_TOKEN }}
        run: |
          # Check which job(s) failed — only act on test failures.
          # The review job handles its own fixes via blocking verdicts.
          FAILED_JOBS=$(gh api \
            "repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/jobs" \
            --jq '[.jobs[] | select(.conclusion == "failure") | .name] | join(", ")')
          echo "jobs=${FAILED_JOBS}" >> "$GITHUB_OUTPUT"

          if echo "$FAILED_JOBS" | grep -qi "test"; then
            echo "is_test_failure=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_test_failure=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Failed jobs: $FAILED_JOBS"

      # When a human's commit fails tests, trigger a review with failure context
      - name: Trigger review
        if: steps.pr.outputs.number != '' && steps.guard.outputs.is_bot == 'false' && steps.failed.outputs.is_test_failure == 'true'
        env:
          GH_TOKEN: ${{ secrets.OPENCODE_PAT || secrets.GITHUB_TOKEN }}
        run: |
          # Fetch the failed job logs (last 200 lines to stay within comment limits)
          LOGS=$(gh run view ${{ github.event.workflow_run.id }} \
            --repo "${{ github.repository }}" \
            --log-failed 2>&1 | tail -200)

          gh pr comment "${{ steps.pr.outputs.number }}" \
            --repo "${{ github.repository }}" \
            --body "/oc-review CI build failed. Please include these failure logs in your review.

          **Failed run:** https://github.com/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}

          \`\`\`
          ${LOGS}
          \`\`\`"

      # When a bot fix also fails tests, alert humans instead of looping
      - name: Alert on repeated failure
        if: steps.pr.outputs.number != '' && steps.guard.outputs.is_bot == 'true' && steps.failed.outputs.is_test_failure == 'true'
        env:
          GH_TOKEN: ${{ secrets.OPENCODE_PAT || secrets.GITHUB_TOKEN }}
        run: |
          LOGS=$(gh run view ${{ github.event.workflow_run.id }} \
            --repo "${{ github.repository }}" \
            --log-failed 2>&1 | tail -100)

          gh pr comment "${{ steps.pr.outputs.number }}" \
            --repo "${{ github.repository }}" \
            --body "⚠️ **Automated fix also failed CI — manual intervention needed.**

          The previous auto-fix commit did not resolve the build failure. A human should investigate.

          **Failed run:** https://github.com/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}

          <details>
          <summary>Failure logs</summary>

          \`\`\`
          ${LOGS}
          \`\`\`

          </details>"
