name: "Build"

on:
  push:
    branches-ignore:
      - main
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".github/workflows/**"
  # Stable builds are triggered by publishing a GitHub Release (e.g. from the
  # "Draft a new release" UI). A release published by a human fires this event;
  # the image is built and tagged from the release's tag.
  release:
    types: [published]
  workflow_call:
    inputs:
      is_release:
        description: "Is this a release build?"
        type: boolean
        required: false
        default: false
      release_tag:
        description: "The release tag"
        type: string
        required: false
        default: ""

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  tests:
    name: "Tests"
    uses: ./.github/workflows/tests.yml

  build:
    name: "Build & Push Docker Image"
    runs-on: ubuntu-latest
    needs: [tests]
    if: needs.tests.result == 'success'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Determine version
        id: version
        run: |
          # Find the latest stable v*.*.* tag, default to v0.0.0
          LATEST=$(git tag -l 'v*.*.*' --sort=-v:refname | grep -vE -- '-' | head -n 1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi

          VERSION="${LATEST#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          # A stable release build is triggered either by publishing a GitHub
          # Release (release event) or by release.yml calling this workflow
          # (workflow_call with is_release=true). Both supply the release tag.
          if [ "${{ github.event_name }}" = "release" ]; then
            RELEASE_TAG="${{ github.event.release.tag_name }}"
          elif [ "${{ inputs.is_release }}" = "true" ]; then
            RELEASE_TAG="${{ inputs.release_tag }}"
          else
            RELEASE_TAG=""
          fi

          if [ -n "$RELEASE_TAG" ]; then
            echo "version=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
            echo "Release version: ${RELEASE_TAG#v}"
          else
            # Dev builds target the next (unreleased) patch version. The dev
            # number is the commit distance since the latest stable release, so
            # it increases with every commit and resets to a low number after
            # each release (when a new stable tag becomes the baseline).
            #
            # No git tag is created for dev builds: the Docker image version is
            # injected via the VERSION build-arg (SETUPTOOLS_SCM_PRETEND_VERSION),
            # so prerelease tags are unnecessary and would only break
            # setuptools-scm's version derivation inside the build.
            NEXT_PATCH=$((PATCH + 1))
            BASE="${MAJOR}.${MINOR}.${NEXT_PATCH}"

            if git rev-parse -q --verify "refs/tags/${LATEST}" >/dev/null; then
              DEV_NUM=$(git rev-list "${LATEST}..HEAD" --count)
            else
              DEV_NUM=$(git rev-list HEAD --count)
            fi

            DEV_VERSION="${BASE}-dev.${DEV_NUM}"
            echo "version=$DEV_VERSION" >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            echo "Dev version: $DEV_VERSION"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Dev tags: version, branch, sha, and static dev tag
      - name: Extract Docker metadata (dev)
        if: steps.version.outputs.is_release == 'false'
        id: meta-dev
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=dev
            type=ref,event=branch
            type=sha

      # Release tags: semver, major.minor, sha
      - name: Extract Docker metadata (release)
        if: steps.version.outputs.is_release == 'true'
        id: meta-release
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=v${{ steps.version.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=v${{ steps.version.outputs.version }}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          tags: ${{ steps.version.outputs.is_release == 'true' && steps.meta-release.outputs.tags || steps.meta-dev.outputs.tags }}
          labels: ${{ steps.version.outputs.is_release == 'true' && steps.meta-release.outputs.labels || steps.meta-dev.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Comment on commit with dev build info
        if: steps.version.outputs.is_release == 'false'
        uses: peter-evans/commit-comment@v3
        with:
          sha: ${{ github.sha }}
          body: |
            :package: Dev build [`v${{ steps.version.outputs.version }}`](https://github.com/${{ github.repository }}/pkgs/container/${{ github.event.repository.name }}) published.

            ```
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ```
