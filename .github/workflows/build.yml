name: "Build"

on:
  push:
    branches: ["**"]
  release:
    types: [published]
  workflow_call:
    inputs:
      is_release:
        description: "Is this a release build?"
        type: boolean
        required: false
        default: false
      release_tag:
        description: "The release tag"
        type: string
        required: false
        default: ""

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  tests:
    name: "Tests"
    uses: ./.github/workflows/tests.yml

  review:
    name: "Code Review"
    needs: tests
    runs-on: ubuntu-latest
    # Only review on regular pushes, not releases or workflow_call
    if: github.event_name == 'push'
    concurrency:
      group: oc-review-${{ github.ref_name }}
      cancel-in-progress: true
    permissions:
      id-token: write
      contents: read
      actions: read
      pull-requests: write
      issues: write
    steps:
      - name: Find associated PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.OPENCODE_PAT || secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "${{ github.ref_name }}" \
            --state open \
            --json number \
            --jq '.[0].number // empty')
          echo "number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          if [ -z "$PR_NUMBER" ]; then
            echo "No open PR for branch ${{ github.ref_name }}, skipping review"
          fi

      - name: Checkout repository
        if: steps.pr.outputs.number != ''
        uses: actions/checkout@v4.2.2
        with:
          persist-credentials: true
          token: ${{ secrets.OPENCODE_PAT || secrets.GITHUB_TOKEN }}

      - name: Run review
        if: steps.pr.outputs.number != ''
        uses: anomalyco/opencode/github@latest
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.OPENCODE_PAT || secrets.GITHUB_TOKEN }}
        with:
          model: openrouter/anthropic/claude-3.7-sonnet
          use_github_token: true
          prompt: |
            You are a senior software engineer performing a thorough code review on this pull request.
            Review the diff carefully and produce a structured review using the sections below.
            For each section, list specific findings with file paths and line numbers. If a section has no findings, write "No issues found." and move on — do NOT pad sections with filler.

            ## Review Sections

            Structure your review comment with these markdown headings:

            ### 🐛 Correctness & Bugs
            Logic errors, off-by-one mistakes, race conditions, incorrect API usage,
            unhandled edge cases, null/None dereference risks, type mismatches.

            ### 🔒 Security
            Injection vulnerabilities, secrets/credentials in code, missing input
            validation, insecure defaults, dependency vulnerabilities, improper
            error exposure.

            ### ⚡ Performance
            Unnecessary allocations, N+1 queries, missing caching opportunities,
            blocking I/O on hot paths, algorithmic complexity concerns.

            ### 🏗️ Design & Maintainability
            SOLID violations, code duplication, poor naming, overly complex logic,
            missing abstractions, tight coupling, dead code.

            ### 🧪 Testing
            Missing test coverage for new/changed behaviour, brittle tests, missing
            edge case tests, test hygiene issues (e.g. hardcoded values, flaky assertions).

            ### 📖 Documentation
            Missing or outdated docstrings, unclear comments, missing CHANGELOG or
            README updates for user-facing changes, undocumented config/env variables.

            ### 💡 Suggestions & Nits
            Style preferences, minor improvements, or nice-to-haves that do NOT
            block merging.

            ## Verdict

            End your review with exactly one of the following verdicts:

            **✅ Verdict: Non-blocking** — The PR is safe to merge. Any findings above
            are minor suggestions that the author can address at their discretion.

            **🚫 Verdict: Blocking** — The PR has issues that MUST be fixed before
            merging. When you give this verdict you MUST also trigger an automated
            fix by posting a comment on the PR using `gh`. Choose the appropriate
            worker based on fix complexity:
            - `/oc-easy` for straightforward, well-scoped fixes (typos, missing
              validation, small logic fixes)
            - `/oc-hard` for complex fixes requiring multi-file changes,
              architectural adjustments, or new tests

            The fix instructions must be specific and actionable, referencing exact
            files, line numbers, and what to change.

            Example — simple fix:
            ```bash
            gh pr comment $PR_NUMBER --body "/oc-easy Fix the off-by-one error in
            f1pred/engine.py:142 where range(len(drivers)) should be
            range(len(drivers) - 1), and add a regression test in
            tests/test_engine.py."
            ```

            Example — complex fix:
            ```bash
            gh pr comment $PR_NUMBER --body "/oc-hard The new caching layer in
            f1pred/cache.py has no TTL expiration and will leak memory. Add a
            max-age eviction policy, update config.yaml with a cache_ttl_seconds
            option, and add integration tests in tests/test_cache.py covering
            expiration and invalidation."
            ```

            ## Guidelines
            - Be constructive, specific, and concise.
            - Cite file paths and line numbers for every finding.
            - Do NOT nitpick formatting if a linter/formatter handles it.
            - Weigh severity: not every imperfection is blocking.
            - A blocking verdict should only be given for correctness bugs,
              security issues, data loss risks, or egregious design problems —
              not for style preferences.

      - name: Check review verdict
        if: steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.OPENCODE_PAT || secrets.GITHUB_TOKEN }}
        run: |
          # Find the most recent comment containing a verdict
          VERDICT=$(gh api \
            "repos/${{ github.repository }}/issues/${{ steps.pr.outputs.number }}/comments" \
            --jq '[.[] | select(.body | test("Verdict:"))] | last | .body' \
            | grep -oP "Verdict: \K[A-Za-z-]+" | tail -1)

          echo "Review verdict: $VERDICT"

          if [ "$VERDICT" = "Blocking" ]; then
            echo "::error::Code review is BLOCKING. The review bot has posted fix instructions on the PR."
            exit 1
          fi

          echo "✅ Review passed"

  build:
    name: "Build & Push Docker Image"
    runs-on: ubuntu-latest
    needs: [tests, review]
    if: |
      always() &&
      needs.tests.result == 'success' &&
      (needs.review.result == 'success' || needs.review.result == 'skipped')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Determine version
        id: version
        run: |
          # Find the latest v*.*.* release tag, default to v0.0.0
          LATEST=$(git tag -l 'v*.*.*' --sort=-v:refname | grep -v '-' | head -n 1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi

          VERSION="${LATEST#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          if [ "${{ inputs.is_release }}" = "true" ]; then
            RELEASE_TAG="${{ inputs.release_tag }}"
            echo "version=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
            echo "Release version: ${RELEASE_TAG#v}"
          elif [ "${{ github.event_name }}" = "release" ]; then
            # For releases, use the release tag directly
            RELEASE_TAG="${{ github.event.release.tag_name }}"
            echo "version=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
            echo "Release version: ${RELEASE_TAG#v}"
          else
            # For prerelease builds, bump patch and add pre suffix
            PATCH=$((PATCH + 1))
            # Use github.run_number since workflow_run is gone
            PRERELEASE="${MAJOR}.${MINOR}.${PATCH}-pre.${{ github.run_number }}"
            echo "version=$PRERELEASE" >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            echo "Prerelease version: $PRERELEASE"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Log in to the Container registry
        uses: docker/login-action@v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Prerelease tags: version, branch, sha, and static prerelease tag
      - name: Extract Docker metadata (prerelease)
        if: steps.version.outputs.is_release == 'false'
        id: meta-prerelease
        uses: docker/metadata-action@v5.7.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=prerelease
            type=ref,event=branch
            type=sha

      # Release tags: semver, major.minor, sha
      - name: Extract Docker metadata (release)
        if: steps.version.outputs.is_release == 'true'
        id: meta-release
        uses: docker/metadata-action@v5.7.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=v${{ steps.version.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=v${{ steps.version.outputs.version }}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6.16.0
        with:
          context: .
          push: true
          tags: ${{ steps.version.outputs.is_release == 'true' && steps.meta-release.outputs.tags || steps.meta-prerelease.outputs.tags }}
          labels: ${{ steps.version.outputs.is_release == 'true' && steps.meta-release.outputs.labels || steps.meta-prerelease.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
