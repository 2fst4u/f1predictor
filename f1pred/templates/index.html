<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Outcome Predictor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600;700&display=swap');
        body {
            font-family: 'Titillium Web', sans-serif;
            background-color: #111827;
            color: #f3f4f6;
        }
        .f1-red { background-color: #e10600; }
        .f1-red-text { color: #e10600; }
        .card { background-color: #1f2937; border-radius: 0.5rem; }
        [x-cloak] { display: none !important; }

        /* Team Colors */
        .team-ferrari { border-left: 4px solid #ef4444; }
        .team-red-bull { border-left: 4px solid #3b82f6; }
        .team-mercedes { border-left: 4px solid #22d3ee; }
        .team-mclaren { border-left: 4px solid #f97316; }
        .team-aston-martin { border-left: 4px solid #059669; }
        .team-alpine { border-left: 4px solid #ec4899; }
        .team-williams { border-left: 4px solid #2563eb; }
        .team-haas { border-left: 4px solid #ffffff; }
        .team-sauber { border-left: 4px solid #22c55e; }
        .team-rb { border-left: 4px solid #1d4ed8; }

        .progress-bar { height: 8px; border-radius: 4px; background: #374151; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 4px; }
    </style>
</head>
<body x-data="f1App()" x-init="init()">
    <div class="min-h-screen">
        <!-- Header -->
        <header class="f1-red shadow-lg p-4">
            <div class="container mx-auto flex justify-between items-center">
                <h1 class="text-2xl font-black tracking-tighter italic">F1 OUTCOME PREDICTOR</h1>
                <div class="flex items-center space-x-4">
                    <div class="flex items-center bg-black bg-opacity-20 rounded-full px-3 py-1 mr-2">
                        <span class="text-[10px] font-bold mr-2 uppercase">Live Mode</span>
                        <button @click="toggleLive()"
                                :class="liveMode ? 'bg-green-500' : 'bg-gray-600'"
                                class="w-8 h-4 rounded-full relative transition duration-200 ease-in-out focus:outline-none">
                            <div :class="liveMode ? 'translate-x-4' : 'translate-x-0'"
                                 class="absolute left-0 top-0 w-4 h-4 bg-white rounded-full shadow transform transition duration-200 ease-in-out"></div>
                        </button>
                    </div>
                    <span class="text-xs font-bold bg-black bg-opacity-20 px-2 py-1 rounded" x-text="'v' + config.model_version"></span>
                    <button @click="runPrediction()" class="bg-black bg-opacity-20 hover:bg-opacity-30 p-2 rounded-full transition">
                        <i class="fas fa-sync-alt" :class="loading ? 'animate-spin' : ''"></i>
                    </button>
                </div>
            </div>
        </header>

        <main class="container mx-auto p-4 md:p-8">
            <!-- Controls -->
            <div class="card p-6 mb-8 shadow-xl">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6 items-end">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 mb-1 uppercase tracking-wider">Season</label>
                        <input type="text" x-model="params.season" placeholder="current"
                               class="w-full bg-gray-800 border border-gray-700 rounded p-2 text-white focus:outline-none focus:ring-2 focus:ring-red-600">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 mb-1 uppercase tracking-wider">Round</label>
                        <input type="text" x-model="params.round" placeholder="next"
                               class="w-full bg-gray-800 border border-gray-700 rounded p-2 text-white focus:outline-none focus:ring-2 focus:ring-red-600">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 mb-1 uppercase tracking-wider">Sessions</label>
                        <div class="flex flex-wrap gap-2 mt-1">
                            <template x-for="s in ['qualifying', 'race', 'sprint', 'sprint_qualifying']">
                                <button @click="toggleSession(s)"
                                        :class="params.sessions.includes(s) ? 'bg-red-600 text-white' : 'bg-gray-800 text-gray-400'"
                                        class="text-xs px-2 py-1 rounded border border-gray-700 hover:border-red-500 transition"
                                        x-text="s.replace('_', ' ').toUpperCase()">
                                </button>
                            </template>
                        </div>
                    </div>
                    <div>
                        <button @click="runPrediction()" :disabled="loading"
                                class="w-full f1-red hover:bg-red-700 text-white font-bold py-2 px-4 rounded shadow-lg disabled:opacity-50 transition transform active:scale-95">
                            <span x-show="!loading">RUN PREDICTION</span>
                            <span x-show="loading" class="flex items-center justify-center">
                                <i class="fas fa-spinner animate-spin mr-2"></i> PROCESSING...
                            </span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Error Message -->
            <div x-show="error" x-transition x-cloak class="bg-red-900 border-l-4 border-red-500 text-red-100 p-4 mb-8" role="alert">
                <p class="font-bold">Error</p>
                <p x-text="error"></p>
            </div>

            <!-- Results Section -->
            <div x-show="results && !loading" x-transition x-cloak>
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-xl font-bold italic uppercase">
                        Results for <span class="f1-red-text" x-text="results.season"></span> Round <span class="f1-red-text" x-text="results.round"></span>
                    </h2>
                </div>

                <!-- Session Tabs -->
                <div class="flex border-b border-gray-700 mb-6 overflow-x-auto">
                    <template x-for="(data, sess) in results.sessions" :key="sess">
                        <button @click="activeSession = sess"
                                :class="activeSession === sess ? 'border-red-600 text-red-500' : 'border-transparent text-gray-400 hover:text-gray-200'"
                                class="py-3 px-6 font-bold uppercase tracking-widest text-sm border-b-2 transition whitespace-nowrap"
                                x-text="sess.replace('_', ' ')">
                        </button>
                    </template>
                </div>

                <!-- Session Content -->
                <template x-for="(data, sess) in results.sessions" :key="sess">
                    <div x-show="activeSession === sess" x-transition>

                        <!-- Weather Info -->
                        <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-6">
                            <template x-if="data.weather && data.weather.temp_mean">
                                <div class="card p-3 flex items-center space-x-3">
                                    <div class="text-2xl text-yellow-500"><i class="fas fa-thermometer-half"></i></div>
                                    <div>
                                        <div class="text-xs text-gray-400 uppercase">Temp</div>
                                        <div class="font-bold" x-text="Math.round(data.weather.temp_mean) + '°C'"></div>
                                    </div>
                                </div>
                            </template>
                            <template x-if="data.weather && data.weather.rain_sum !== undefined">
                                <div class="card p-3 flex items-center space-x-3">
                                    <div class="text-2xl text-blue-500"><i class="fas fa-cloud-rain"></i></div>
                                    <div>
                                        <div class="text-xs text-gray-400 uppercase">Rain</div>
                                        <div class="font-bold" x-text="data.weather.rain_sum.toFixed(1) + 'mm'"></div>
                                    </div>
                                </div>
                            </template>
                            <template x-if="data.weather && data.weather.wind_mean">
                                <div class="card p-3 flex items-center space-x-3">
                                    <div class="text-2xl text-gray-400"><i class="fas fa-wind"></i></div>
                                    <div>
                                        <div class="text-xs text-gray-400 uppercase">Wind</div>
                                        <div class="font-bold" x-text="Math.round(data.weather.wind_mean) + 'km/h'"></div>
                                    </div>
                                </div>
                            </template>
                        </div>

                        <!-- Predictions Table -->
                        <div class="card shadow-2xl overflow-hidden">
                            <div class="overflow-x-auto">
                                <table class="w-full text-left">
                                    <thead>
                                        <tr class="bg-gray-800 text-xs font-bold text-gray-400 uppercase tracking-wider">
                                            <th class="p-4 w-12 text-center">Pos</th>
                                            <th class="p-4">Driver</th>
                                            <th class="p-4 hidden md:table-cell">Team</th>
                                            <th class="p-4 text-center">Grid</th>
                                            <th class="p-4">Win Prob</th>
                                            <th class="p-4">Podium</th>
                                            <th class="p-4">DNF</th>
                                            <th class="p-4 text-right">Actual</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-gray-800">
                                        <template x-for="(p, index) in data.predictions" :key="p.driverId">
                                            <tr class="hover:bg-gray-800 transition group" :class="getTeamClass(p.constructorName)">
                                                <td class="p-4 text-center font-black italic text-lg"
                                                    :class="index < 3 ? 'text-yellow-500' : 'text-gray-500'"
                                                    x-text="p.predicted_position"></td>
                                                <td class="p-4">
                                                    <div class="flex items-center space-x-3">
                                                        <div class="font-bold uppercase tracking-tighter" x-text="p.code || '???'"></div>
                                                        <div class="font-semibold text-gray-200 group-hover:text-white" x-text="p.name"></div>
                                                    </div>
                                                </td>
                                                <td class="p-4 hidden md:table-cell">
                                                    <span class="text-sm text-gray-400" x-text="p.constructorName"></span>
                                                </td>
                                                <td class="p-4 text-center">
                                                    <div class="flex flex-col items-center">
                                                        <span class="font-bold" x-text="p.grid || '--'"></span>
                                                        <template x-if="p.grid && p.grid != p.predicted_position">
                                                            <span class="text-[10px]" :class="p.grid > p.predicted_position ? 'text-green-500' : 'text-red-500'">
                                                                <i class="fas" :class="p.grid > p.predicted_position ? 'fa-caret-up' : 'fa-caret-down'"></i>
                                                                <span x-text="Math.abs(p.grid - p.predicted_position)"></span>
                                                            </span>
                                                        </template>
                                                    </div>
                                                </td>
                                                <td class="p-4">
                                                    <div class="w-24">
                                                        <div class="flex justify-between text-[10px] mb-1">
                                                            <span x-text="(p.p_win * 100).toFixed(1) + '%'"></span>
                                                        </div>
                                                        <div class="progress-bar">
                                                            <div class="progress-fill" :style="'width: ' + (p.p_win * 100) + '%; background-color: ' + getProbColor(p.p_win * 100)"></div>
                                                        </div>
                                                    </div>
                                                </td>
                                                <td class="p-4">
                                                    <div class="w-24">
                                                        <div class="flex justify-between text-[10px] mb-1">
                                                            <span x-text="(p.p_top3 * 100).toFixed(1) + '%'"></span>
                                                        </div>
                                                        <div class="progress-bar">
                                                            <div class="progress-fill" :style="'width: ' + (p.p_top3 * 100) + '%; background-color: ' + getProbColor(p.p_top3 * 100)"></div>
                                                        </div>
                                                    </div>
                                                </td>
                                                <td class="p-4">
                                                    <div class="w-24">
                                                        <div class="flex justify-between text-[10px] mb-1">
                                                            <span x-text="(p.p_dnf * 100).toFixed(1) + '%'"></span>
                                                        </div>
                                                        <div class="progress-bar">
                                                            <div class="progress-fill" :style="'width: ' + (p.p_dnf * 100) + '%; background-color: ' + getProbColor(p.p_dnf * 100, true)"></div>
                                                        </div>
                                                    </div>
                                                </td>
                                                <td class="p-4 text-right">
                                                    <template x-if="p.actual_position">
                                                        <span class="font-bold px-2 py-1 rounded"
                                                              :class="p.actual_position == p.predicted_position ? 'bg-green-600' : (Math.abs(p.actual_position - p.predicted_position) <= 2 ? 'bg-blue-600' : 'bg-gray-700')"
                                                              x-text="p.actual_position"></span>
                                                    </template>
                                                    <template x-if="!p.actual_position">
                                                        <span class="text-gray-600 italic">--</span>
                                                    </template>
                                                </td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </template>
            </div>

            <!-- Empty State -->
            <div x-show="!results && !loading" class="flex flex-col items-center justify-center py-20 text-gray-500">
                <i class="fas fa-flag-checkered text-6xl mb-4 opacity-20"></i>
                <p class="text-xl font-light">Select a race and run prediction to start</p>
            </div>
        </main>

        <footer class="mt-auto py-8 text-center text-gray-600 text-xs uppercase tracking-widest">
            &copy; 2024 F1 Outcome Predictor • Built with FastAPI & AI
        </footer>
    </div>

    <script>
        function f1App() {
            return {
                loading: false,
                liveMode: false,
                liveInterval: null,
                config: {},
                params: {
                    season: '',
                    round: '',
                    sessions: []
                },
                results: null,
                activeSession: null,
                error: null,

                async init() {
                    try {
                        const resp = await fetch('/api/config');
                        this.config = await resp.json();
                        this.params.sessions = this.config.default_sessions || ['qualifying', 'race'];
                    } catch (e) {
                        console.error("Failed to load config", e);
                    }
                },

                toggleLive() {
                    this.liveMode = !this.liveMode;
                    if (this.liveMode) {
                        this.runPrediction();
                        this.liveInterval = setInterval(() => {
                            if (!this.loading) this.runPrediction();
                        }, 30000);
                    } else {
                        if (this.liveInterval) {
                            clearInterval(this.liveInterval);
                            this.liveInterval = null;
                        }
                    }
                },

                toggleSession(s) {
                    if (this.params.sessions.includes(s)) {
                        this.params.sessions = this.params.sessions.filter(x => x !== s);
                    } else {
                        this.params.sessions.push(s);
                    }
                },

                async runPrediction() {
                    this.loading = true;
                    this.error = null;
                    this.results = null;

                    try {
                        const queryParams = new URLSearchParams();
                        if (this.params.season) queryParams.append('season', this.params.season);
                        if (this.params.round) queryParams.append('round', this.params.round);
                        this.params.sessions.forEach(s => queryParams.append('sessions', s));

                        const resp = await fetch(`/api/predict?${queryParams.toString()}`);
                        if (!resp.ok) {
                            const err = await resp.json();
                            throw new Error(err.detail || "Prediction failed");
                        }

                        this.results = await resp.json();
                        if (this.results.sessions) {
                            this.activeSession = Object.keys(this.results.sessions)[0];
                        }
                    } catch (e) {
                        this.error = e.message;
                    } finally {
                        this.loading = false;
                    }
                },

                getTeamClass(team) {
                    if (!team) return '';
                    const t = team.toLowerCase();
                    if (t.includes('ferrari')) return 'team-ferrari';
                    if (t.includes('red bull')) return 'team-red-bull';
                    if (t.includes('mercedes')) return 'team-mercedes';
                    if (t.includes('mclaren')) return 'team-mclaren';
                    if (t.includes('aston martin')) return 'team-aston-martin';
                    if (t.includes('alpine')) return 'team-alpine';
                    if (t.includes('williams')) return 'team-williams';
                    if (t.includes('haas')) return 'team-haas';
                    if (t.includes('sauber') || t.includes('kick')) return 'team-sauber';
                    if (t.includes('rb') || t.includes('racing bulls')) return 'team-rb';
                    return '';
                },

                getProbColor(val, isDnf = false) {
                    if (isDnf) {
                        if (val < 5) return '#10b981'; // Green
                        if (val < 15) return '#f59e0b'; // Amber
                        return '#ef4444'; // Red
                    }
                    if (val < 10) return '#4b5563'; // Gray
                    if (val < 40) return '#06b6d4'; // Cyan
                    if (val < 70) return '#10b981'; // Green
                    return '#f59e0b'; // Amber
                }
            }
        }
    </script>
</body>
</html>
