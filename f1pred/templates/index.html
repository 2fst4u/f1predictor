<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Outcome Predictor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600;700&display=swap');

        body {
            font-family: 'Titillium Web', sans-serif;
            background-color: #111827;
            color: #f3f4f6;
        }

        .f1-red {
            background-color: #e10600;
        }

        .f1-red-text {
            color: #e10600;
        }

        .card {
            background-color: #1f2937;
            border-radius: 0.5rem;
        }

        [x-cloak] {
            display: none !important;
        }

        /* Team Colors */
        .team-ferrari {
            border-left: 4px solid #ef4444;
        }

        .team-red-bull {
            border-left: 4px solid #3b82f6;
        }

        .team-mercedes {
            border-left: 4px solid #22d3ee;
        }

        .team-mclaren {
            border-left: 4px solid #f97316;
        }

        .team-aston-martin {
            border-left: 4px solid #059669;
        }

        .team-alpine {
            border-left: 4px solid #ec4899;
        }

        .team-williams {
            border-left: 4px solid #2563eb;
        }

        .team-haas {
            border-left: 4px solid #ffffff;
        }

        .team-sauber {
            border-left: 4px solid #22c55e;
        }

        .team-rb {
            border-left: 4px solid #1d4ed8;
        }

        .progress-bar {
            height: 8px;
            border-radius: 4px;
            background: #374151;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 4px;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Live indicator pulse animation */
        @keyframes pulse-live {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.5;
                transform: scale(0.85);
            }
        }

        .live-pulse {
            animation: pulse-live 2s ease-in-out infinite;
        }

        /* Movement highlight static backgrounds */
        .movement-up {
            background-color: rgba(34, 197, 94, 0.2);
            transition: background-color 0.5s;
        }

        .movement-down {
            background-color: rgba(239, 68, 68, 0.2);
            transition: background-color 0.5s;
        }
    </style>
</head>

<body x-data="f1App()" x-init="init()" @resize.window.throttle.100ms="windowWidth = window.innerWidth">
    <div class="min-h-screen">
        <!-- Header -->
        <header class="f1-red shadow-lg p-4">
            <div class="max-w-[1400px] w-full mx-auto flex justify-between items-center flex-wrap gap-2">
                <h1 class="text-xl md:text-2xl font-black tracking-tighter italic whitespace-nowrap">F1 OUTCOME
                    PREDICTOR</h1>
                <div class="flex items-center space-x-2 min-w-0">
                    <!-- Live indicator -->
                    <template x-if="liveConnected">
                        <span class="flex items-center space-x-1 bg-black bg-opacity-20 px-2 py-1 rounded"
                            :title="'Live updates active. Last update: ' + (liveLastUpdate || 'never')">
                            <span class="w-2 h-2 rounded-full bg-green-400 live-pulse" aria-hidden="true"></span>
                            <span class="text-xs font-bold text-green-300 uppercase tracking-tighter">Live</span>
                        </span>
                    </template>
                    <template x-if="!liveConnected && liveReconnecting">
                        <span class="flex items-center space-x-1 bg-black bg-opacity-20 px-2 py-1 rounded"
                            title="Reconnecting to live updates...">
                            <span class="w-2 h-2 rounded-full bg-yellow-400 animate-pulse" aria-hidden="true"></span>
                            <span
                                class="text-xs font-bold text-yellow-300 uppercase tracking-tighter">Reconnecting</span>
                        </span>
                    </template>
                    <span
                        class="text-xs font-bold text-white text-opacity-60 uppercase tracking-tighter truncate max-w-[80px] sm:max-w-none inline-block">
                        <span class="sr-only">Model Version </span><span aria-hidden="true">M:</span><span
                            x-text="config.model_version"></span>
                    </span>
                    <span
                        class="text-xs font-bold bg-black bg-opacity-20 px-2 py-1 rounded truncate max-w-[60px] sm:max-w-none inline-block">
                        <span class="sr-only">App Version </span><span aria-hidden="true">v</span><span
                            x-text="config.app_version"></span>
                    </span>
                    <button @click="refreshData()" :disabled="loading" aria-label="Refresh data"
                        :title="loading ? 'Prediction in progress' : 'Refresh data'"
                        class="bg-black bg-opacity-20 hover:bg-opacity-30 focus:outline-none focus-visible:ring-2 focus-visible:ring-white p-2 rounded-full transition disabled:opacity-50 disabled:cursor-not-allowed flex-shrink-0">
                        <i class="fas fa-sync-alt" :class="loading ? 'animate-spin' : ''" aria-hidden="true"></i>
                    </button>
                </div>
            </div>
        </header>

        <main class="max-w-[1400px] w-full mx-auto px-2 py-4 md:p-8">
            <!-- Controls -->
            <div class="card p-4 md:p-6 mb-4 md:mb-8 shadow-xl">
                <div class="flex flex-col gap-4">
                    <div class="flex justify-between items-end gap-4">
                        <div class="flex items-center gap-2">
                             <div class="text-xs text-gray-500 hidden md:block mr-2" x-show="liveLastUpdate">
                                 Last prediction: <span x-text="liveLastUpdate"></span>
                             </div>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-400 mb-2 uppercase tracking-wider">Round (Auto-Predicted)</label>
                        <div class="flex space-x-2 overflow-x-auto no-scrollbar pb-2" :class="{'opacity-50 pointer-events-none': scheduleLoading}">
                            <template x-if="scheduleLoading">
                                <span class="text-xs text-gray-500 italic mt-1.5 pt-1">Loading schedule...</span>
                            </template>
                            <template x-for="(r, index) in schedule" :key="r.round || index">
                                <button @click="selectRound(r.round)"
                                    :disabled="scheduleLoading || loading"
                                    :class="params.round === r.round ? 'bg-red-600 text-white border-red-500' : 'bg-gray-800 text-gray-400 border-gray-700 hover:border-gray-500'"
                                    class="flex-shrink-0 text-xs px-3 py-1.5 rounded border transition focus:outline-none focus-visible:ring-2 focus-visible:ring-red-500 flex flex-col items-center justify-center min-w-[70px] disabled:cursor-not-allowed">
                                    <span class="font-bold mb-0.5 whitespace-nowrap" x-text="'Round ' + (r.round || index + 1)"></span>
                                    <span class="text-[10px] uppercase tracking-tighter w-full max-w-[90px] truncate text-center" :class="params.round === r.round ? 'opacity-100' : 'opacity-75'" x-text="r.raceName.replace(' Grand Prix', '')"></span>
                                </button>
                            </template>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Error Message -->
            <div x-show="error" x-transition x-cloak class="bg-red-900 border-l-4 border-red-500 text-red-100 p-4 mb-8"
                role="alert">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="font-bold">Error</p>
                        <p x-text="error"></p>
                    </div>
                    <button @click="error = null" aria-label="Dismiss error" title="Dismiss error"
                        class="text-red-300 hover:text-white focus:outline-none focus-visible:ring-2 focus-visible:ring-white rounded p-1 transition">
                        <i class="fas fa-times" aria-hidden="true"></i>
                    </button>
                </div>
            </div>

            <!-- Progress Logs -->
            <div x-show="loading" x-transition x-cloak class="card p-4 mb-8 border-l-4 border-blue-500">
                <details>
                    <summary class="flex items-center cursor-pointer mb-2 focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-500 rounded">
                        <i class="fas fa-terminal mr-2 text-blue-400" aria-hidden="true"></i>
                        <h3 class="text-xs font-bold uppercase tracking-widest text-gray-400">Prediction Progress</h3>
                        <span class="ml-2 text-[10px] text-gray-500 italic" x-text="'(Processing Round ' + params.round + ')'"></span>
                    </summary>
                    <div class="bg-black bg-opacity-30 rounded p-3 font-mono text-xs h-32 overflow-y-auto space-y-1"
                        id="log-container" aria-live="polite">
                        <template x-for="log in logs">
                            <div class="flex">
                                <span class="text-blue-500 mr-2" aria-hidden="true">></span>
                                <span class="text-gray-300" x-text="log"></span>
                            </div>
                        </template>
                        <div class="flex items-center text-blue-400 animate-pulse">
                            <span class="mr-2" aria-hidden="true">></span>
                            <span x-text="currentLog"></span>
                            <span class="ml-1" aria-hidden="true">...</span>
                        </div>
                    </div>
                </details>
            </div>

            <!-- Recent Changes Panel -->
            <template x-if="filteredRecentChanges().length > 0">
                <div x-show="!loading" x-transition x-cloak
                    class="card p-4 mb-4 md:mb-8 border-l-4 border-green-500 shadow-xl">
                    <details open>
                        <summary
                            class="flex items-center cursor-pointer mb-2 focus:outline-none focus-visible:ring-2 focus-visible:ring-green-500 rounded">
                            <i class="fas fa-exchange-alt mr-2 text-green-400" aria-hidden="true"></i>
                            <h3 class="text-xs font-bold uppercase tracking-widest text-gray-400">Recent Position
                                Changes</h3>
                            <span class="ml-2 text-xs bg-green-600 text-white px-1.5 py-0.5 rounded-full"
                                x-text="filteredRecentChanges().length"></span>
                        </summary>
                        <div class="space-y-2 max-h-48 overflow-y-auto">
                            <template x-for="(change, ci) in filteredRecentChanges()" :key="ci">
                                <div class="bg-black bg-opacity-30 rounded p-2 text-sm flex items-center gap-3">
                                    <span class="text-xs text-gray-500 font-mono w-14 flex-shrink-0"
                                        x-text="new Date(change.timestamp).toLocaleTimeString()"></span>
                                    <span
                                        class="text-xs bg-gray-700 text-gray-300 px-1.5 py-0.5 rounded uppercase tracking-wider flex-shrink-0"
                                        x-text="change.session.replace('_', ' ')"></span>
                                    <span class="font-bold uppercase tracking-tighter w-10 text-center"
                                        :class="change.direction > 0 ? 'text-green-400' : 'text-red-400'">
                                        <span x-text="change.code"></span>
                                    </span>
                                    <span class="text-gray-300 truncate" x-text="change.driver_name"></span>
                                    <span class="flex items-center gap-1 flex-shrink-0">
                                        <span class="text-gray-500" x-text="'P' + change.old_position"></span>
                                        <i class="fas fa-long-arrow-alt-right text-gray-600" aria-hidden="true"></i>
                                        <span class="font-bold"
                                            :class="change.direction > 0 ? 'text-green-400' : 'text-red-400'"
                                            x-text="'P' + change.new_position"></span>
                                        <span :class="change.direction > 0 ? 'text-green-400' : 'text-red-400'">
                                            <i class="fas"
                                                :class="change.direction > 0 ? 'fa-caret-up' : 'fa-caret-down'"
                                                aria-hidden="true"></i>
                                            <span x-text="Math.abs(change.direction)"></span>
                                        </span>
                                    </span>
                                    <span class="text-xs text-gray-500 truncate hidden sm:inline"
                                        x-text="change.reasons.join(', ')"></span>
                                </div>
                            </template>
                        </div>
                    </details>
                </div>
            </template>

            <!-- Results Section -->
            <div x-show="results" x-transition x-cloak>
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-xl font-bold italic uppercase">
                        Results for <span class="f1-red-text" x-text="results?.season">Season</span> Round <span
                            class="f1-red-text" x-text="results?.round">Round</span>
                    </h2>
                </div>

                <!-- Session Tabs -->
                <div class="flex border-b border-gray-700 mb-6 overflow-x-auto" role="tablist"
                    x-show="getAvailableSessions().length > 1"
                    aria-label="Session Results">
                    <template x-for="sess in getAvailableSessions()" :key="sess">
                        <button @click="activeSession = sess" role="tab"
                            :aria-selected="(activeSession === sess).toString()" :id="'tab-' + sess"
                            :aria-controls="'panel-' + sess"
                            :class="activeSession === sess ? 'border-red-600 text-red-500' : 'border-transparent text-gray-400 hover:text-gray-200'"
                            class="py-3 px-2 sm:px-6 font-bold uppercase tracking-widest text-xs sm:text-sm border-b-2 transition whitespace-nowrap focus:outline-none focus-visible:ring-2 focus-visible:ring-red-500 focus-visible:border-transparent"
                            x-text="sess.replace('_', ' ')">
                        </button>
                    </template>
                </div>

                <!-- Session Content -->
                <template x-for="[sess, data] in Object.entries(results?.sessions || {})" :key="sess">
                    <div x-show="activeSession === sess || getAvailableSessions().length === 1" x-transition role="tabpanel" :id="'panel-' + sess"
                        :aria-labelledby="'tab-' + sess" tabindex="0"
                        class="focus:outline-none focus-visible:ring-2 focus-visible:ring-red-500 focus-visible:ring-opacity-50 rounded-lg">

                        <!-- Weather Info -->
                        <div class="grid grid-cols-3 md:grid-cols-5 gap-2 sm:gap-4 mb-6">
                            <template x-if="data.weather && data.weather.temp_mean">
                                <div class="card p-1 md:p-3 flex items-center space-x-1 md:space-x-3">
                                    <div class="text-lg md:text-2xl text-yellow-500"><i class="fas fa-thermometer-half"
                                            aria-hidden="true"></i></div>
                                    <div>
                                        <div class="text-xs text-gray-400 uppercase">Temp</div>
                                        <div class="font-bold text-xs md:text-base"
                                            x-text="Math.round(data.weather.temp_mean) + '°C'"></div>
                                    </div>
                                </div>
                            </template>
                            <template x-if="data.weather && data.weather.rain_sum !== undefined">
                                <div class="card p-1 md:p-3 flex items-center space-x-1 md:space-x-3">
                                    <div class="text-lg md:text-2xl text-blue-500"><i class="fas fa-cloud-rain"
                                            aria-hidden="true"></i></div>
                                    <div>
                                        <div class="text-xs text-gray-400 uppercase">Rain</div>
                                        <div class="font-bold text-xs md:text-base"
                                            x-text="data.weather.rain_sum.toFixed(1) + 'mm'"></div>
                                    </div>
                                </div>
                            </template>
                            <template x-if="data.weather && data.weather.wind_mean">
                                <div class="card p-1 md:p-3 flex items-center space-x-1 md:space-x-3">
                                    <div class="text-lg md:text-2xl text-gray-400"><i class="fas fa-wind"
                                            aria-hidden="true"></i></div>
                                    <div>
                                        <div class="text-xs text-gray-400 uppercase">Wind</div>
                                        <div class="font-bold text-xs md:text-base"
                                            x-text="Math.round(data.weather.wind_mean) + 'km/h'"></div>
                                    </div>
                                </div>
                            </template>
                        </div>

                        <!-- Predictions Table -->
                        <div class="card shadow-2xl overflow-hidden">
                            <div class="overflow-x-auto">
                                <table class="w-full text-left">
                                    <thead>
                                        <tr
                                            class="bg-gray-800 text-xs font-bold text-gray-400 uppercase tracking-wider">
                                            <th scope="col" class="px-0.5 py-2 sm:p-4 w-7 sm:w-12 text-center"><abbr
                                                    title="Predicted Position"
                                                    class="cursor-help underline decoration-dotted decoration-gray-500 underline-offset-4 hover:text-white transition-colors">Pos</abbr>
                                            </th>
                                            <th scope="col" class="px-0.5 py-2 sm:p-4">Driver</th>
                                            <th scope="col" class="px-0.5 py-2 sm:p-4 hidden md:table-cell">Team</th>
                                            <th scope="col" class="px-0.5 py-2 sm:p-4 text-center"
                                                x-show="hasGrid(sess) && !data.frozen"><abbr title="Predicted finish compared to starting grid"
                                                    class="cursor-help underline decoration-dotted decoration-gray-500 underline-offset-4 hover:text-white transition-colors">Grid & Exp Delta</abbr>
                                            </th>
                                            <th scope="col" class="px-0.5 py-2 sm:p-4 text-center text-blue-300"
                                                x-show="data.frozen"><abbr title="Actual finish compared to predicted finish"
                                                    class="cursor-help underline decoration-dotted decoration-blue-500 underline-offset-4 hover:text-blue-200 transition-colors">Real Pos & Acc.</abbr>
                                            </th>
                                            <th scope="col" class="px-0.5 py-2 sm:p-4">
                                                <span class="hidden sm:inline"
                                                    x-text="['qualifying', 'sprint_qualifying'].includes(sess) ? 'Pole Prob' : 'Win Prob'">Win
                                                    Prob</span>
                                                <span class="sm:hidden"
                                                    x-text="['qualifying', 'sprint_qualifying'].includes(sess) ? 'Pole %' : 'Win %'">Win
                                                    %</span>
                                            </th>
                                            <th scope="col" class="px-0.5 py-2 sm:p-4">
                                                <span class="hidden sm:inline">Podium</span>
                                                <span class="sm:hidden">Top 3</span>
                                            </th>
                                            <th scope="col" class="px-0.5 py-2 sm:p-4 text-right"
                                                x-show="['race', 'sprint'].includes(sess)"><abbr
                                                    title="Did Not Finish Probability"
                                                    class="cursor-help underline decoration-dotted decoration-gray-500 underline-offset-4 hover:text-white transition-colors">DNF</abbr>
                                            </th>
                                        </tr>
                                    </thead>
                                    <template x-for="(p, index) in data.predictions" :key="p.driverId">
                                        <tbody class="border-none hover:bg-white/5 transition-colors">
                                            <tr :class="[getTeamClass(p.constructorName), getMovementClass(p.driverId, sess)]"
                                                class="text-sm sm:text-base transition-colors">
                                                <!-- Position -->
                                                <td class="px-0.5 pt-2 sm:pt-4 px-0.5 sm:px-4 text-center font-black italic text-base sm:text-lg align-top"
                                                    :class="index === 0 ? 'text-yellow-400' : index === 1 ? 'text-gray-300' : index === 2 ? 'text-amber-600' : 'text-gray-500'"
                                                    x-text="p.predicted_position"></td>
                                                <!-- Driver -->
                                                <td class="px-0.5 pt-2 sm:pt-4 px-0.5 sm:px-4 align-top">
                                                    <div class="flex items-center space-x-1 sm:space-x-3 mb-0.5">
                                                        <!-- Movement arrow -->
                                                        <template x-if="getDriverMovement(p.driverId, sess)">
                                                            <span
                                                                class="flex-shrink-0 text-xs font-bold flex items-center gap-0.5"
                                                                :class="getDriverMovement(p.driverId, sess).direction > 0 ? 'text-green-400' : 'text-red-400'"
                                                                :title="getDriverMovement(p.driverId, sess).reasons.join(', ')">
                                                                <i class="fas"
                                                                    :class="getDriverMovement(p.driverId, sess).direction > 0 ? 'fa-caret-up' : 'fa-caret-down'"
                                                                    aria-hidden="true"></i>
                                                                <span
                                                                    x-text="Math.abs(getDriverMovement(p.driverId, sess).direction)"></span>
                                                            </span>
                                                        </template>
                                                        <div class="font-bold uppercase tracking-tighter"
                                                            x-text="p.code || '???'"></div>
                                                        <div class="font-semibold text-gray-200 truncate max-w-[120px] sm:max-w-none"
                                                            x-text="p.name"></div>
                                                    </div>
                                                </td>
                                                <!-- Team -->
                                                <td
                                                    class="px-0.5 pt-2 sm:pt-4 px-0.5 sm:px-4 hidden md:table-cell align-top">
                                                    <span class="text-sm text-gray-400"
                                                        x-text="p.constructorName">Team</span>
                                                </td>
                                                <!-- Grid & Pred Delta (Unfrozen) -->
                                                <td class="px-0.5 pt-2 sm:pt-4 sm:px-4 text-center align-top"
                                                    x-show="hasGrid(sess) && !data.frozen">
                                                    <div class="flex flex-col items-center mt-1">
                                                        <span class="text-[10px] text-gray-500 mb-0.5">Start P<span x-text="p.grid || '--'"></span></span>
                                                        <template x-if="p.grid && p.grid != p.predicted_position">
                                                            <span class="text-sm font-bold" :class="p.grid > p.predicted_position ? 'text-green-500' : 'text-red-500'">
                                                                <i class="fas" :class="p.grid > p.predicted_position ? 'fa-caret-up' : 'fa-caret-down'" aria-hidden="true"></i>
                                                                <span x-text="Math.abs(p.grid - p.predicted_position)"></span>
                                                            </span>
                                                        </template>
                                                        <template x-if="p.grid && p.grid == p.predicted_position">
                                                            <span class="text-sm font-bold text-gray-600">-</span>
                                                        </template>
                                                    </div>
                                                </td>

                                                <!-- Actual & Accuracy (Frozen) -->
                                                <td class="px-0.5 pt-2 sm:pt-4 sm:px-4 text-center align-top"
                                                    x-show="data.frozen">
                                                    <div class="flex flex-col items-center">
                                                        <span class="font-black text-xl text-blue-400">P<span x-text="p.actual_position || '?'"></span></span>
                                                        <template x-if="p.actual_position">
                                                            <div class="flex items-center gap-1 mt-0.5" :title="'Predicted P' + p.predicted_position + ' vs Actual P' + p.actual_position">
                                                                <span class="text-[10px] text-gray-400" x-text="p.actual_position == p.predicted_position ? 'Perfect' : 'Err:'"></span>
                                                                <span class="text-xs font-bold" x-show="p.actual_position != p.predicted_position" :class="Math.abs(p.predicted_position - p.actual_position) <= 1 ? 'text-green-500' : (Math.abs(p.predicted_position - p.actual_position) >= 5 ? 'text-red-500' : 'text-yellow-500')">
                                                                    <span x-text="Math.abs(p.predicted_position - p.actual_position)"></span>
                                                                </span>
                                                            </div>
                                                        </template>
                                                    </div>
                                                </td>
                                                <!-- Win % -->
                                                <td class="px-0.5 pt-2 sm:pt-4 px-0.5 sm:px-4 align-top">
                                                    <div class="w-10 sm:w-24">
                                                        <div class="text-xs mb-0.5 sm:mb-1"
                                                            x-text="(p.p_win * 100).toFixed(1) + '%'"></div>
                                                        <div class="progress-bar hidden sm:block" aria-hidden="true">
                                                            <div class="progress-fill"
                                                                :style="'width: ' + (p.p_win * 100) + '%; background-color: ' + getProbColor(p.p_win * 100)">
                                                            </div>
                                                        </div>
                                                    </div>
                                                </td>
                                                <!-- Top 3 % -->
                                                <td class="px-0.5 pt-2 sm:pt-4 px-0.5 sm:px-4 align-top">
                                                    <div class="w-10 sm:w-24">
                                                        <div class="text-xs mb-0.5 sm:mb-1"
                                                            x-text="(p.p_top3 * 100).toFixed(1) + '%'"></div>
                                                        <div class="progress-bar hidden sm:block" aria-hidden="true">
                                                            <div class="progress-fill"
                                                                :style="'width: ' + (p.p_top3 * 100) + '%; background-color: ' + getProbColor(p.p_top3 * 100)">
                                                            </div>
                                                        </div>
                                                    </div>
                                                </td>
                                                <!-- DNF % -->

                                                                                <span class="sr-only"

                                                                                    x-text="feat.val < 0 ? '▲' : '▼'"></span>

                                                                                    aria-hidden="true">
                                                                                    <div class="h-full rounded"

                                <div class="mt-3 rounded border border-gray-700 bg-gray-900/40 p-3">
                                    <div class="text-xs font-bold uppercase tracking-widest text-gray-400 mb-2">
                                        Influence Legend</div>

                                        <div>
                                            <div class="font-semibold text-gray-200 mb-1">Model Mix (ensemble blend)
                                            </div>

                                                <div>
                                                    <span class="text-cyan-400 font-semibold">GBM (AI Speed
                                                        Prediction)</span>:
                                                    <p class="mt-0.5 text-gray-400 leading-relaxed">The primary
                                                        intelligence engine. It functions like a sophisticated
                                                        pattern-finder, analyzing hundreds of granular data points—such
                                                        as track temperature, air pressure, and specific driver
                                                        momentum—to predict raw lap speed for this specific weekend.
                                                        Unlike the other models which look at historical rankings, the
                                                        GBM focuses on how current conditions will affect performance
                                                        right now.</p>
                                                </div>
                                                <div>
                                                    <span class="text-yellow-400 font-semibold">Elo (Overall Skill
                                                        Score)</span>:
                                                    <p class="mt-0.5 text-gray-400 leading-relaxed">A long-term talent
                                                        tracker similar to ratings used in Chess or competitive video
                                                        games. This score is pure "skill signal"—it increases when a
                                                        driver beats strong rivals and decreases when they lose to
                                                        weaker ones. It helps the predictor understand a driver's
                                                        baseline quality regardless of their current car or the specific

                                                </div>

                                                    <span class="text-purple-400 font-semibold">BT (Matchup

                                                    <p class="mt-0.5 text-gray-400 leading-relaxed">The Bradley-Terry
                                                        model is a "Head-to-Head Ranker." It calculates strength by

                                                        If Driver A consistently finishes ahead of Driver B, the model
                                                        builds a mathematical hierarchy of who is most likely to win in

                                                        of the team they are driving for. It ensures that a world-class

                                                    Green</span> = improves predicted finish (helps).</div>
                                            <div aria-hidden="true"><span class="text-red-400 font-semibold">▼
                                                    Red</span> = worsens predicted finish (hurts).</div>
                                            <div class="sr-only">Green indicates factors that improve predicted finish
                                                (helps), while Red indicates factors that worsen predicted finish
                                                (hurts).</div>

                                                magnitude for that driver.</div>

                                            class="cursor-pointer text-xs font-bold uppercase tracking-widest text-gray-400 hover:text-gray-200 focus:outline-none focus-visible:ring-2 focus-visible:ring-gray-400 rounded transition">
                                            Input Variable Glossary</summary>

                                                    class="flex justify-between gap-2 text-gray-300 border-b border-gray-800/60 pb-0.5">

            <!-- Empty State -->
            <div x-show="!results && !loading" class="flex flex-col items-center justify-center py-20 text-gray-500">
                <i class="fas fa-flag-checkered text-6xl mb-4 opacity-20" aria-hidden="true"></i>

        </main>

        <footer class="mt-auto py-8 text-center text-gray-600 text-xs uppercase tracking-widest">
            &copy; 2024 F1 Outcome Predictor • Built with FastAPI & AI
        </footer>
    </div>

    <script>
        function f1App() {
            return {
                loading: false,
                scheduleLoading: false,
                config: {},
                seasons: [],
                schedule: [],
                eventSessions: [],
                statusLoading: false,
                params: {
                    season: '',
                    round: '',
                    sessions: []
                },
                allRoundsData: {},
                results: null,
                predictingRound: null,
                activeSession: null,
                error: null,
                logs: [],
                currentLog: 'Initializing',
                windowWidth: window.innerWidth,
                _lastStatusSeason: null,
                _lastStatusRound: null,
                _lastScheduleSeason: null,

                // Live prediction state
                liveConnected: false,
                liveReconnecting: false,
                liveLastUpdate: null,
                _liveEventSource: null,
                _liveReconnectTimer: null,
                recentChanges: [],       // Array of DriverMovement objects
                _movements: {},          // session -> { driverId -> movement object }
                _movementTimers: {},     // driverId -> timeout id

                saveState() {
                    try {
                        const state = {
                            params: this.params,
                            results: this.results,
                            allRoundsData: this.allRoundsData,
                            activeSession: this.activeSession,
                            _lastStatusSeason: this._lastStatusSeason,
                            _lastStatusRound: this._lastStatusRound,
                            _lastScheduleSeason: this._lastScheduleSeason
                        };
                        localStorage.setItem('f1_pred_state', JSON.stringify(state));
                    } catch (e) {
                        console.warn("Failed to save state to localStorage", e);
                    }
                },

                loadState() {
                    try {
                        const saved = localStorage.getItem('f1_pred_state');
                        if (saved) {
                            const state = JSON.parse(saved);
                            this.params = state.params || this.params;
                            this.results = state.results || null;
                            this.allRoundsData = state.allRoundsData || {};
                            this.activeSession = state.activeSession || null;
                            this._lastStatusSeason = state._lastStatusSeason || null;
                            this._lastStatusRound = state._lastStatusRound || null;
                            this._lastScheduleSeason = state._lastScheduleSeason || null;
                            return true;
                        }
                    } catch (e) {
                        console.warn("Failed to load state from localStorage", e);
                    }
                    return false;
                },

                async refreshData() {
                    localStorage.removeItem('f1_pred_state');
                    this.params.season = '';
                    this.params.round = '';
                    this.params.sessions = [];
                    this.results = null;
                    this.activeSession = null;
                    this._lastStatusSeason = null;
                    this._lastStatusRound = null;
                    this._lastScheduleSeason = null;
                    await this.init();
                },

                async init() {
                    // Initialize windowWidth
                    this.windowWidth = window.innerWidth;

                    const hasLoadedState = this.loadState();

                    try {
                        // Parallelize critical path fetches
                        const [configResp, latestResp] = await Promise.all([
                            fetch('/api/config'),
                            fetch('/api/predictions/latest').catch(() => null)
                        ]);

                        if (!configResp.ok) throw new Error(`HTTP ${configResp.status}`);
                        this.config = await configResp.json();

                        // Handle latest predictions cache
                        if (latestResp && latestResp.ok) {
                            const latest = await latestResp.json();
                            if (latest && latest.results && latest.results.rounds) {
                                this.allRoundsData = latest.results.rounds;
                                if (latest.last_update) {
                                    this.liveLastUpdate = new Date(latest.last_update).toLocaleTimeString();
                                }
                            }
                        }

                        if (!hasLoadedState) {
                            this.params.sessions = this.config.default_sessions || ['qualifying', 'race'];
                        }

                        // Load non-critical data in background
                        fetch('/api/seasons').then(r => r.json()).then(data => { this.seasons = data; }).catch(() => {});

                        // Pre-select if available AND we didn't load from state
                        if (!hasLoadedState && this.config.next_event) {
                            this.params.season = String(this.config.next_event.season || '');
                            const round = this.config.next_event.round;

                            // Trigger schedule and round selection concurrently
                            await Promise.all([
                                this.fetchSchedule(),
                                round ? this.selectRound(round, true) : Promise.resolve()
                            ]);
                        } else if (hasLoadedState && this.params.season) {
                            // If we have state, still fetch schedule to populate dropdowns
                            // but our guard logic in fetchSchedule will handle idempotency
                            const oldLastScheduleSeason = this._lastScheduleSeason;
                            this._lastScheduleSeason = null; // Force fetch for dropdowns
                            await this.fetchSchedule();
                            this._lastScheduleSeason = oldLastScheduleSeason;
                        }
                    } catch (e) {
                        console.error("Failed to initialize app", e);
                        this.error = "Failed to initialize application data. Check your connection.";
                    }

                    // Start live SSE connection
                    this.connectLive();
                },

                connectLive() {
                    // Close existing connection if any
                    if (this._liveEventSource) {
                        this._liveEventSource.close();
                        this._liveEventSource = null;
                    }
                    if (this._liveReconnectTimer) {
                        clearTimeout(this._liveReconnectTimer);
                        this._liveReconnectTimer = null;
                    }

                    this.liveReconnecting = true;

                    const eventSource = new EventSource('/api/predictions/live');
                    this._liveEventSource = eventSource;

                    eventSource.onopen = () => {
                        this.liveConnected = true;
                        this.liveReconnecting = false;
                        console.log('[Live] Connected to prediction stream');
                    };

                    eventSource.onmessage = (event) => {
                        try {
                            const payload = JSON.parse(event.data);
                            this.handleLiveEvent(payload);
                        } catch (e) {
                            console.error('[Live] Failed to parse message', e);
                        }
                    };

                    eventSource.onerror = () => {
                        this.liveConnected = false;
                        eventSource.close();
                        this._liveEventSource = null;
                        console.warn('[Live] Connection lost, reconnecting in 10s...');
                        this.liveReconnecting = true;
                        this._liveReconnectTimer = setTimeout(() => this.connectLive(), 10000);
                    };
                },

                handleLiveEvent(payload) {
                    if (payload.type === 'prediction' && payload.data) {
                        const data = payload.data;
                        this.allRoundsData = data.rounds || {};

                        if (this.params.round && this.allRoundsData[this.params.round]) {
                            this.results = this.allRoundsData[this.params.round];
                        }

                        this.liveLastUpdate = payload.timestamp
                            ? new Date(payload.timestamp).toLocaleTimeString()
                            : new Date().toLocaleTimeString();
                    }

                    if (payload.type === 'prediction_round' && payload.data) {
                        const data = payload.data;
                        this.allRoundsData[String(data.round)] = data;

                        const viewingSameEvent = (
                            String(this.params.season) === String(data.season) &&
                            String(this.params.round) === String(data.round)
                        );

                        if (viewingSameEvent || !this.results) {
                            this.results = data;
                            if (!this.activeSession && data.sessions) {
                                this.activeSession = Object.keys(data.sessions)[0];
                            }
                            this.saveState();
                        }

                        this.liveLastUpdate = payload.timestamp
                            ? new Date(payload.timestamp).toLocaleTimeString()
                            : new Date().toLocaleTimeString();
                    }

                    if (payload.type === 'diff' && payload.data) {
                        const diff = payload.data;

                        // Store movements per session for row highlighting
                        if (!this._movements[diff.session]) {
                            this._movements[diff.session] = {};
                        }

                        for (const m of diff.movements || []) {
                            // Add to recent changes
                            this.recentChanges.unshift({
                                ...m,
                                session: diff.session,
                                timestamp: diff.timestamp || new Date().toISOString(),
                            });

                            // Store for row highlighting
                            this._movements[diff.session][m.driver_id] = m;

                            // Auto-clear highlight after 30 seconds
                            const timerId = `${diff.session}_${m.driver_id}`;
                            if (this._movementTimers[timerId]) {
                                clearTimeout(this._movementTimers[timerId]);
                            }
                            this._movementTimers[timerId] = setTimeout(() => {
                                if (this._movements[diff.session]) {
                                    delete this._movements[diff.session][m.driver_id];
                                }
                                delete this._movementTimers[timerId];
                            }, 30000);
                        }

                        // Cap recent changes at 20
                        if (this.recentChanges.length > 20) {
                            this.recentChanges = this.recentChanges.slice(0, 20);
                        }
                    }

                    if (payload.type === 'status') {
                        if (payload.last_update) {
                            this.liveLastUpdate = new Date(payload.last_update).toLocaleTimeString();
                        }
                    }
                },

                getDriverMovement(driverId, session) {
                    const sessionMovements = this._movements[session];
                    if (!sessionMovements) return null;
                    return sessionMovements[driverId] || null;
                },

                getMovementClass(driverId, session) {
                    const m = this.getDriverMovement(driverId, session);
                    if (!m) return '';
                    return m.direction > 0 ? 'movement-up' : 'movement-down';
                },

                filteredRecentChanges() {
                    if (!this.activeSession) return this.recentChanges;
                    return this.recentChanges.filter(c => c.session === this.activeSession);
                },

                getAvailableSessions() {
                    if (!this.results || !this.results.sessions) return [];
                    const order = ['sprint_qualifying', 'sprint', 'qualifying', 'race'];
                    return Object.keys(this.results.sessions).sort((a, b) => {
                        return order.indexOf(a) - order.indexOf(b);
                    });
                },

                async fetchSchedule() {
                    const season = String(this.params.season || '');
                    if (!season) {
                        this.schedule = [];
                        this._lastScheduleSeason = null;
                        return;
                    }
                    if (season === String(this._lastScheduleSeason)) {
                        return;
                    }
                    this.scheduleLoading = true;
                    try {
                        const resp = await fetch(`/api/schedule/${this.params.season}`);
                        if (!resp.ok) {
                            const text = await resp.text();
                            throw new Error(`HTTP ${resp.status}: ${text}`);
                        }
                        const data = await resp.json();
                        this.schedule = data.races || [];
                        // Reset round if current round is not in new schedule
                        if (!this.schedule.some(r => String(r.round) === String(this.params.round))) {
                            this.params.round = '';
                            this.eventSessions = [];
                        } else {
                            await this.fetchEventStatus();
                        }
                    } catch (e) {
                        console.error("Failed to fetch schedule", e);
                    } finally {
                        this.scheduleLoading = false;
                        this._lastScheduleSeason = this.params.season;
                        this.saveState();
                    }
                },

                async fetchEventStatus() {
                    const currentSeason = String(this.params.season || '');
                    const currentRound = String(this.params.round || '');

                    // Skip fetch if this specific event status was already loaded.
                    // This is the primary guard against redundant calls during resize or layout shifts.
                    if (currentSeason === String(this._lastStatusSeason) && currentRound === String(this._lastStatusRound)) {
                        return;
                    }

                    if (!currentSeason || !currentRound) {
                        this.eventSessions = [];
                        this._lastStatusSeason = null;
                        this._lastStatusRound = null;
                        return;
                    }

                    this.eventSessions = [];
                    this.statusLoading = true;
                    try {
                        const resp = await fetch(`/api/event-status/${this.params.season}/${this.params.round}`);
                        if (!resp.ok) {
                            const text = await resp.text();
                            throw new Error(`HTTP ${resp.status}: ${text}`);
                        }
                        const data = await resp.json();
                        this.eventSessions = data.sessions || [];

                        // Auto-select sessions that don't have results yet
                        // AND include the most recent session that HAS results
                        const lastWithResults = [...this.eventSessions].reverse().find(s => s.has_results);

                        const toSelect = this.eventSessions
                            .filter(s => !s.has_results)
                            .map(s => s.id);

                        if (lastWithResults) {
                            toSelect.unshift(lastWithResults.id);
                        }

                        if (toSelect.length > 0) {
                            this.params.sessions = toSelect;
                        } else if (this.eventSessions.length > 0) {
                            // If all have results, just select the main ones or none
                            this.params.sessions = [this.eventSessions[this.eventSessions.length - 1].id];
                        }
                    } catch (e) {
                        console.error("Failed to fetch event status", e);
                    } finally {
                        this.statusLoading = false;
                        this._lastStatusSeason = String(this.params.season);
                        this._lastStatusRound = String(this.params.round);
                        this.saveState();
                    }
                },

                toggleSession(s) {
                    if (this.params.sessions.includes(s)) {
                        this.params.sessions = this.params.sessions.filter(x => x !== s);
                    } else {
                        this.params.sessions.push(s);
                    }
                    this.saveState();
                },

                async selectRound(rnd, silent = false) {
                    const roundStr = String(rnd);
                    this.params.round = roundStr;

                    // Immediately show cached results if available
                    if (this.allRoundsData[roundStr]) {
                        this.results = this.allRoundsData[roundStr];
                        if (this.results && this.results.sessions) {
                            if (!this.activeSession || !this.results.sessions[this.activeSession]) {
                                this.activeSession = Object.keys(this.results.sessions)[0];
                            }
                        }
                    } else {
                        this.results = null;
                    }

                    await this.fetchEventStatus();

                    // Trigger prediction if missing and not already being predicted
                    // In silent mode (e.g. startup), we DON'T trigger a new prediction pipeline
                    if (!this.results && !this.loading && !silent && this.predictingRound !== roundStr) {
                        await this.runPrediction();
                    }
                    this.saveState();
                },

                // Deprecated: UI button removed, kept for local test compatibility
                async runPrediction() {
                    const targetRound = this.params.round;
                    this.loading = true;
                    this.predictingRound = targetRound;
                    this.error = null;
                    this.logs = [];
                    this.currentLog = 'Starting prediction engine';

                    try {
                        const queryParams = new URLSearchParams();
                        if (this.params.season) queryParams.append('season', this.params.season);
                        if (this.params.round) queryParams.append('round', this.params.round);
                        this.params.sessions.forEach(s => queryParams.append('sessions', s));

                        const response = await fetch(`/api/predict/stream?${queryParams.toString()}`);
                        if (!response.ok) {
                            const err = await response.json();
                            throw new Error(err.detail || "Prediction failed");
                        }

                        const reader = response.body.getReader();
                        const decoder = new TextDecoder();
                        let buffer = '';

                        while (true) {
                            const { value, done } = await reader.read();
                            if (done) break;

                            buffer += decoder.decode(value, { stream: true });
                            const lines = buffer.split('\n');
                            buffer = lines.pop();

                            for (const line of lines) {
                                if (line.startsWith('data: ')) {
                                    try {
                                        const payload = JSON.parse(line.substring(6));
                                        if (payload.type === 'log') {
                                            if (this.currentLog && this.currentLog !== payload.message) {
                                                this.logs.push(this.currentLog);
                                            }
                                            this.currentLog = payload.message;
                                            this.$nextTick(() => {
                                                const container = document.getElementById('log-container');
                                                if (container) container.scrollTop = container.scrollHeight;
                                            });
                                        } else if (payload.type === 'results') {
                                            const data = payload.data;
                                            if (data && data.round) {
                                                this.allRoundsData[String(data.round)] = data;
                                                // Only update active view if we're still looking at the same round
                                                if (String(data.round) === String(this.params.round)) {
                                                    this.results = data;
                                                    if (!this.activeSession && data.sessions) {
                                                        this.activeSession = Object.keys(data.sessions)[0];
                                                    }
                                                }
                                            }
                                        } else if (payload.type === 'error') {
                                            throw new Error(payload.message);
                                        }
                                    } catch (e) {
                                        console.error("Failed to parse SSE message", e);
                                    }
                                }
                            }
                        }

                        if (this.results && this.results.sessions) {
                            this.activeSession = Object.keys(this.results.sessions)[0];
                            this.saveState();
                        } else if (!this.error) {
                            throw new Error("No results received from server");
                        }
                    } catch (e) {
                        this.error = e.message;
                    } finally {
                        this.loading = false;
                        this.predictingRound = null;
                    }
                },

                getTeamClass(team) {
                    if (!team) return '';
                    const t = team.toLowerCase();
                    if (t.includes('ferrari')) return 'team-ferrari';
                    if (t.includes('red bull')) return 'team-red-bull';
                    if (t.includes('mercedes')) return 'team-mercedes';
                    if (t.includes('mclaren')) return 'team-mclaren';
                    if (t.includes('aston martin')) return 'team-aston-martin';
                    if (t.includes('alpine')) return 'team-alpine';
                    if (t.includes('williams')) return 'team-williams';
                    if (t.includes('haas')) return 'team-haas';
                    if (t.includes('sauber') || t.includes('kick')) return 'team-sauber';
                    if (t.includes('rb') || t.includes('racing bulls')) return 'team-rb';
                    return '';
                },

                getProbColor(val, isDnf = false) {
                    if (isDnf) {
                        if (val < 5) return '#10b981'; // Green
                        if (val < 15) return '#f59e0b'; // Amber
                        return '#ef4444'; // Red
                    }
                    if (val < 10) return '#4b5563'; // Gray
                    if (val < 40) return '#06b6d4'; // Cyan
                    if (val < 70) return '#10b981'; // Green
                    return '#f59e0b'; // Amber
                },

                hasGrid(sess) {
                    return sess === 'race' || sess === 'sprint';
                },

                // Feature name → human-readable label map (mirrors _FEATURE_LABELS in predict.py)
                _featureLabels: {
                    form_index: 'Race Form',
                    qualifying_form_index: 'Quali Form',
                    driver_team_form_index: 'Driver-Team Fit',
                    team_form_index: 'Team Strength',
                    teammate_delta: 'vs Teammate',
                    grid_finish_delta: 'Overtaking Skill',
                    circuit_avg_pos: 'Circuit History',
                    circuit_dnf_rate: 'Circuit DNF Rate',
                    circuit_experience: 'Circuit Experience',
                    circuit_overtake_difficulty: 'Pass Difficulty',
                    global_circuit_dnf_rate: 'Track DNF Rate',
                    grid: 'Grid Position',
                    current_quali_pos: 'Quali Position',
                    weather_effect: 'Weather Impact',
                    weather_beta_temp: 'Temp Sensitivity',
                    weather_beta_pressure: 'Pressure Sensitivity',
                    weather_beta_wind: 'Wind Sensitivity',
                    weather_beta_rain: 'Rain Sensitivity',
                    temp_skill: 'Temp Skill',
                    rain_skill: 'Rain Skill',
                    wind_skill: 'Wind Skill',
                    pressure_skill: 'Pressure Skill',
                    weather_temp_mean: 'Air Temp',
                    weather_rain_sum: 'Rain Total',
                    weather_wind_mean: 'Wind Speed',
                    weather_pressure_mean: 'Air Pressure',
                    weather_humidity_mean: 'Humidity',
                    team_tenure_events: 'Team Tenure',
                    is_race: 'Race Session',
                    is_qualifying: 'Quali Session',
                    is_sprint: 'Sprint Session',
                    constructorId: 'Constructor',
                },

                _normalizeShap(shapValues) {
                    if (!shapValues) return {};

                    if (typeof shapValues === 'string') {
                        try {
                            const parsed = JSON.parse(shapValues);
                            return (parsed && typeof parsed === 'object' && !Array.isArray(parsed)) ? parsed : {};
                        } catch (_) {
                            return {};
                        }
                    }

                    if (Array.isArray(shapValues)) {
                        const firstObj = shapValues.find(v => v && typeof v === 'object' && !Array.isArray(v));
                        return firstObj || {};
                    }

                    if (typeof shapValues === 'object') {
                        return shapValues;
                    }

                    return {};
                },

                hasShapFactors(shapValues) {
                    const normalized = this._normalizeShap(shapValues);
                    const hiddenFeats = ["form_index", "qualifying_form_index", "sprint_form_index", "sprint_qualifying_form_index", "grid", "is_race", "is_qualifying", "is_sprint"];
                    const visibleKeys = Object.keys(normalized).filter(k => !hiddenFeats.includes(k));
                    return visibleKeys.length > 0;
                },

                getFeatureLegendEntries() {
                    return Object.entries(this._featureLabels)
                        .map(([key, label]) => ({ key, label }))
                        .sort((a, b) => a.label.localeCompare(b.label));
                },

                getFactorLimit() {
                    const w = this.windowWidth || window.innerWidth;
                    const containerW = Math.min(w, 1400);
                    // Mobile should only show as many as can fit
                    if (w < 768) return Math.floor((w - 32) / 94);

                    // Sidebar (w-64 = 256px) is side-by-side at >= 768px (md breakpoint).
                    // sidebar(256) + gap(16) = 272 (was gap-x-8 = 32px)
                    // responsive padding (approximate): 120-150px
                    const offset = w >= 1024 ? 380 : 350;
                    const available = containerW - offset;

                    // Fixed budget of 126px (110px item + 16px gap).
                    const count = Math.floor(available / 126);
                    return Math.max(1, Math.min(20, count));
                },

                // Returns sorted SHAP feature array for a driver, with labels and
                // percentage-of-max magnitude (for bar width scaling).
                getSortedShap(shapValues, trigger) {
                    const normalized = this._normalizeShap(shapValues);
                    const limit = this.getFactorLimit();
                    const hiddenFeats = ["form_index", "qualifying_form_index", "sprint_form_index", "sprint_qualifying_form_index", "grid", "is_race", "is_qualifying", "is_sprint"];
                    const entries = Object.entries(normalized)
                        .filter(([key, _]) => !hiddenFeats.includes(key))
                        .map(([key, val]) => {
                            const numVal = Number(val);
                            return {
                                key,
                                val: Number.isFinite(numVal) ? numVal : 0,
                                absVal: Math.abs(Number.isFinite(numVal) ? numVal : 0),
                                label: this._featureLabels[key] || key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase())
                            };
                        })
                        // Filter out features with near-zero influence to keep data meaningful
                        .filter(e => e.absVal > 1e-5)
                        .sort((a, b) => b.absVal - a.absVal)
                        .slice(0, limit);

                    const maxAbs = (entries.length > 0 && entries[0].absVal > 0) ? entries[0].absVal : 1;
                    return entries.map(e => ({ ...e, absPct: (e.absVal / maxAbs) * 100 }));
                }
            }
        }
    </script>
