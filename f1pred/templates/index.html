<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Outcome Predictor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600;700&display=swap');
        body {
            font-family: 'Titillium Web', sans-serif;
            background-color: #111827;
            color: #f3f4f6;
        }
        .f1-red { background-color: #e10600; }
        .f1-red-text { color: #e10600; }
        .card { background-color: #1f2937; border-radius: 0.5rem; }
        [x-cloak] { display: none !important; }

        /* Team Colors */
        .team-ferrari { border-left: 4px solid #ef4444; }
        .team-red-bull { border-left: 4px solid #3b82f6; }
        .team-mercedes { border-left: 4px solid #22d3ee; }
        .team-mclaren { border-left: 4px solid #f97316; }
        .team-aston-martin { border-left: 4px solid #059669; }
        .team-alpine { border-left: 4px solid #ec4899; }
        .team-williams { border-left: 4px solid #2563eb; }
        .team-haas { border-left: 4px solid #ffffff; }
        .team-sauber { border-left: 4px solid #22c55e; }
        .team-rb { border-left: 4px solid #1d4ed8; }

        .progress-bar { height: 8px; border-radius: 4px; background: #374151; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 4px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body x-data="f1App()" x-init="init()">
    <div class="min-h-screen">
        <!-- Header -->
        <header class="f1-red shadow-lg p-4">
            <div class="container mx-auto flex justify-between items-center flex-wrap gap-2">
                <h1 class="text-xl md:text-2xl font-black tracking-tighter italic whitespace-nowrap">F1 OUTCOME PREDICTOR</h1>
                <div class="flex items-center space-x-2 min-w-0">
                    <span class="text-[10px] font-bold text-white text-opacity-60 uppercase tracking-tighter truncate max-w-[80px] sm:max-w-none inline-block">
                        <span class="sr-only">Model Version </span><span aria-hidden="true">M:</span><span x-text="config.model_version"></span>
                    </span>
                    <span class="text-xs font-bold bg-black bg-opacity-20 px-2 py-1 rounded truncate max-w-[60px] sm:max-w-none inline-block">
                        <span class="sr-only">App Version </span><span aria-hidden="true">v</span><span x-text="config.app_version"></span>
                    </span>
                    <button @click="refreshData()" :disabled="loading" aria-label="Refresh data" :title="loading ? 'Prediction in progress' : 'Refresh data'" class="bg-black bg-opacity-20 hover:bg-opacity-30 focus:outline-none focus:ring-2 focus:ring-white p-2 rounded-full transition disabled:opacity-50 disabled:cursor-not-allowed flex-shrink-0">
                        <i class="fas fa-sync-alt" :class="loading ? 'animate-spin' : ''" aria-hidden="true"></i>
                    </button>
                </div>
            </div>
        </header>

        <main class="container mx-auto px-2 py-4 md:p-8">
            <!-- Controls -->
            <div class="card p-4 md:p-6 mb-4 md:mb-8 shadow-xl">
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6 items-end">
                    <div>
                        <label for="input-season" class="block text-xs font-bold text-gray-400 mb-1 uppercase tracking-wider">Season</label>
                        <select id="input-season" x-model="params.season" @change="fetchSchedule()" :disabled="loading"
                                class="w-full bg-gray-800 border border-gray-700 rounded p-1.5 md:p-2 text-sm text-white focus:outline-none focus:ring-2 focus:ring-red-600 disabled:opacity-50 disabled:cursor-not-allowed">
                            <option value="" x-text="seasons.length ? 'Select Season' : 'Loading seasons...'"></option>
                            <template x-for="s in seasons" :key="s.season">
                                <option :value="s.season" x-text="s.season"></option>
                            </template>
                        </select>
                    </div>
                    <div>
                        <label for="input-round" class="block text-xs font-bold text-gray-400 mb-1 uppercase tracking-wider">Round</label>
                        <select id="input-round" x-model="params.round" @change="fetchEventStatus()" :disabled="!params.season || scheduleLoading || loading" :title="!params.season ? 'Select a season first' : (scheduleLoading ? 'Loading schedule...' : (loading ? 'Prediction in progress' : 'Select a round'))"
                                class="w-full bg-gray-800 border border-gray-700 rounded p-1.5 md:p-2 text-sm text-white focus:outline-none focus:ring-2 focus:ring-red-600 disabled:opacity-50 disabled:cursor-not-allowed">
                            <option value="" x-text="scheduleLoading ? 'Loading rounds...' : 'Select Round'"></option>
                            <template x-for="(r, index) in schedule" :key="r.round || index">
                                <option :value="r.round" x-text="'Round ' + (r.round || index + 1) + ': ' + r.raceName"></option>
                            </template>
                        </select>
                    </div>
                    <div class="col-span-2 md:col-span-1">
                        <label class="block text-xs font-bold text-gray-400 mb-1 uppercase tracking-wider" id="sessions-label">Sessions</label>
                        <div class="flex flex-wrap gap-2 mt-1" role="group" aria-labelledby="sessions-label">
                            <template x-for="s in eventSessions" :key="s.id">
                                <button @click="toggleSession(s.id)"
                                        :disabled="loading"
                                        :aria-pressed="params.sessions.includes(s.id).toString()"
                                        :class="params.sessions.includes(s.id) ? 'bg-red-600 text-white' : 'bg-gray-800 text-gray-400'"
                                        class="text-[10px] md:text-xs px-2 py-1 rounded border border-gray-700 hover:border-red-500 transition focus:outline-none focus:ring-2 focus:ring-red-500 flex items-center space-x-1 disabled:opacity-50 disabled:cursor-not-allowed">
                                    <span x-text="s.id.replace('_', ' ').toUpperCase()"></span>
                                    <template x-if="s.has_results">
                                        <span>
                                            <i class="fas fa-check-circle text-green-400 ml-1" aria-hidden="true"></i>
                                            <span class="sr-only">Results available</span>
                                        </span>
                                    </template>
                                </button>
                            </template>
                            <template x-if="statusLoading">
                                <span class="text-[10px] md:text-xs px-2 py-1 text-gray-400 italic flex items-center">
                                    <i class="fas fa-circle-notch fa-spin mr-1.5" aria-hidden="true"></i> Loading...
                                </span>
                            </template>
                            <template x-if="!eventSessions.length && !statusLoading">
                                <span class="text-xs text-gray-500 italic mt-1.5">Select a round...</span>
                            </template>
                        </div>
                    </div>
                    <div class="col-span-2 md:col-span-1">
                        <button @click="runPrediction()" :disabled="loading || !params.season || !params.round || params.sessions.length === 0"
                                :title="(!params.season || !params.round) ? 'Select a season and round to predict' : (params.sessions.length === 0 ? 'Select at least one session' : '')"
                                class="w-full f1-red hover:bg-red-700 text-white font-bold py-2 px-4 rounded shadow-lg disabled:opacity-50 disabled:cursor-not-allowed transition transform active:scale-95 focus:outline-none focus:ring-2 focus:ring-white focus:ring-offset-2 focus:ring-offset-gray-900">
                            <span x-show="!loading">RUN PREDICTION</span>
                            <span x-show="loading" class="flex items-center justify-center">
                                <i class="fas fa-spinner animate-spin mr-2" aria-hidden="true"></i> PROCESSING...
                            </span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Error Message -->
            <div x-show="error" x-transition x-cloak class="bg-red-900 border-l-4 border-red-500 text-red-100 p-4 mb-8" role="alert">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="font-bold">Error</p>
                        <p x-text="error"></p>
                    </div>
                    <button @click="error = null" aria-label="Dismiss error" title="Dismiss error" class="text-red-300 hover:text-white focus:outline-none focus:ring-2 focus:ring-white rounded p-1 transition">
                        <i class="fas fa-times" aria-hidden="true"></i>
                    </button>
                </div>
            </div>

            <!-- Progress Logs -->
            <div x-show="loading" x-transition x-cloak class="card p-4 mb-8 border-l-4 border-blue-500">
                <div class="flex items-center mb-2">
                    <i class="fas fa-terminal mr-2 text-blue-400" aria-hidden="true"></i>
                    <h3 class="text-xs font-bold uppercase tracking-widest text-gray-400">Prediction Progress</h3>
                </div>
                <div class="bg-black bg-opacity-30 rounded p-3 font-mono text-xs h-32 overflow-y-auto space-y-1" id="log-container" aria-live="polite">
                    <template x-for="log in logs">
                        <div class="flex">
                            <span class="text-blue-500 mr-2" aria-hidden="true">></span>
                            <span class="text-gray-300" x-text="log"></span>
                        </div>
                    </template>
                    <div class="flex items-center text-blue-400 animate-pulse">
                        <span class="mr-2" aria-hidden="true">></span>
                        <span x-text="currentLog"></span>
                        <span class="ml-1" aria-hidden="true">...</span>
                    </div>
                </div>
            </div>

            <!-- Results Section -->
            <div x-show="results && !loading" x-transition x-cloak>
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-xl font-bold italic uppercase">
                        Results for <span class="f1-red-text" x-text="results?.season">Season</span> Round <span class="f1-red-text" x-text="results?.round">Round</span>
                    </h2>
                </div>

                <!-- Session Tabs -->
                <div class="flex border-b border-gray-700 mb-6 overflow-x-auto" role="tablist" aria-label="Session Results">
                    <template x-for="(data, sess) in (results?.sessions || {})" :key="sess">
                        <button @click="activeSession = sess"
                                role="tab"
                                :aria-selected="(activeSession === sess).toString()"
                                :id="'tab-' + sess"
                                :aria-controls="'panel-' + sess"
                                :class="activeSession === sess ? 'border-red-600 text-red-500' : 'border-transparent text-gray-400 hover:text-gray-200'"
                                class="py-3 px-2 sm:px-6 font-bold uppercase tracking-widest text-xs sm:text-sm border-b-2 transition whitespace-nowrap focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent"
                                x-text="sess.replace('_', ' ')">
                        </button>
                    </template>
                </div>

                <!-- Session Content -->
                <template x-for="(data, sess) in (results?.sessions || {})" :key="sess">
                    <div x-show="activeSession === sess" x-transition
                         role="tabpanel"
                         :id="'panel-' + sess"
                         :aria-labelledby="'tab-' + sess"
                         tabindex="0"
                         class="focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-opacity-50 rounded-lg">

                        <!-- Weather Info -->
                        <div class="grid grid-cols-3 md:grid-cols-5 gap-2 sm:gap-4 mb-6">
                            <template x-if="data.weather && data.weather.temp_mean">
                                <div class="card p-1 md:p-3 flex items-center space-x-1 md:space-x-3">
                                    <div class="text-lg md:text-2xl text-yellow-500"><i class="fas fa-thermometer-half" aria-hidden="true"></i></div>
                                    <div>
                                        <div class="text-[10px] md:text-xs text-gray-400 uppercase">Temp</div>
                                        <div class="font-bold text-xs md:text-base" x-text="Math.round(data.weather.temp_mean) + '°C'"></div>
                                    </div>
                                </div>
                            </template>
                            <template x-if="data.weather && data.weather.rain_sum !== undefined">
                                <div class="card p-1 md:p-3 flex items-center space-x-1 md:space-x-3">
                                    <div class="text-lg md:text-2xl text-blue-500"><i class="fas fa-cloud-rain" aria-hidden="true"></i></div>
                                    <div>
                                        <div class="text-[10px] md:text-xs text-gray-400 uppercase">Rain</div>
                                        <div class="font-bold text-xs md:text-base" x-text="data.weather.rain_sum.toFixed(1) + 'mm'"></div>
                                    </div>
                                </div>
                            </template>
                            <template x-if="data.weather && data.weather.wind_mean">
                                <div class="card p-1 md:p-3 flex items-center space-x-1 md:space-x-3">
                                    <div class="text-lg md:text-2xl text-gray-400"><i class="fas fa-wind" aria-hidden="true"></i></div>
                                    <div>
                                        <div class="text-[10px] md:text-xs text-gray-400 uppercase">Wind</div>
                                        <div class="font-bold text-xs md:text-base" x-text="Math.round(data.weather.wind_mean) + 'km/h'"></div>
                                    </div>
                                </div>
                            </template>
                        </div>

                        <!-- Predictions Table -->
                        <div class="card shadow-2xl overflow-hidden">
                            <div class="overflow-x-auto">
                                <table class="w-full text-left">
                                    <thead>
                                        <tr class="bg-gray-800 text-[10px] sm:text-xs font-bold text-gray-400 uppercase tracking-wider">
                                            <th scope="col" class="px-0.5 py-2 sm:p-4 w-7 sm:w-12 text-center"><abbr title="Predicted Position" class="cursor-help underline decoration-dotted decoration-gray-500 underline-offset-4 hover:text-white transition-colors">Pos</abbr></th>
                                            <th scope="col" class="px-0.5 py-2 sm:p-4">Driver</th>
                                            <th scope="col" class="px-0.5 py-2 sm:p-4 hidden md:table-cell">Team</th>
                                            <th scope="col" class="px-0.5 py-2 sm:p-4 text-center" x-show="hasGrid(sess)"><abbr title="Starting Grid Position" class="cursor-help underline decoration-dotted decoration-gray-500 underline-offset-4 hover:text-white transition-colors">Grid</abbr></th>
                                            <th scope="col" class="px-0.5 py-2 sm:p-4">
                                                <span class="hidden sm:inline">Win Prob</span>
                                                <span class="sm:hidden">Win %</span>
                                            </th>
                                            <th scope="col" class="px-0.5 py-2 sm:p-4">
                                                <span class="hidden sm:inline">Podium</span>
                                                <span class="sm:hidden">Top 3</span>
                                            </th>
                                            <th scope="col" class="px-0.5 py-2 sm:p-4 text-right"><abbr title="Did Not Finish Probability" class="cursor-help underline decoration-dotted decoration-gray-500 underline-offset-4 hover:text-white transition-colors">DNF</abbr></th>
                                        </tr>
                                    </thead>
                                    <template x-for="(p, index) in data.predictions" :key="p.driverId">
                                        <tbody class="border-none">
                                            <tr :class="getTeamClass(p.constructorName)" class="text-sm sm:text-base">
                                                <!-- Position -->
                                                <td class="px-0.5 pt-2 sm:pt-4 px-0.5 sm:px-4 text-center font-black italic text-base sm:text-lg align-top"
                                                    :class="index === 0 ? 'text-yellow-400' : index === 1 ? 'text-gray-300' : index === 2 ? 'text-amber-600' : 'text-gray-500'"
                                                    x-text="p.predicted_position"></td>
                                                <!-- Driver -->
                                                <td class="px-0.5 pt-2 sm:pt-4 px-0.5 sm:px-4 align-top">
                                                    <div class="flex items-center space-x-1 sm:space-x-3 mb-0.5">
                                                        <div class="font-bold uppercase tracking-tighter" x-text="p.code || '???'"></div>
                                                        <div class="font-semibold text-gray-200 truncate max-w-[120px] sm:max-w-none" x-text="p.name"></div>
                                                    </div>
                                                </td>
                                                <!-- Team -->
                                                <td class="px-0.5 pt-2 sm:pt-4 px-0.5 sm:px-4 hidden md:table-cell align-top">
                                                    <span class="text-sm text-gray-400" x-text="p.constructorName">Team</span>
                                                </td>
                                                <!-- Grid -->
                                                <td class="px-0.5 pt-2 sm:pt-4 px-0.5 sm:px-4 text-center align-top" x-show="hasGrid(sess)">
                                                    <div class="flex flex-col items-center">
                                                        <span class="font-bold" x-text="p.grid || '--'"></span>
                                                        <template x-if="p.grid && p.grid != p.predicted_position">
                                                            <span class="text-[10px]" :class="p.grid > p.predicted_position ? 'text-green-500' : 'text-red-500'">
                                                                <span class="sr-only" x-text="p.grid > p.predicted_position ? 'Improves position by:' : 'Worsens position by:'"></span>
                                                                <i class="fas" :class="p.grid > p.predicted_position ? 'fa-caret-up' : 'fa-caret-down'" aria-hidden="true"></i>
                                                                <span x-text="Math.abs(p.grid - p.predicted_position)"></span>
                                                            </span>
                                                        </template>
                                                    </div>
                                                </td>
                                                <!-- Win % -->
                                                <td class="px-0.5 pt-2 sm:pt-4 px-0.5 sm:px-4 align-top">
                                                    <div class="w-10 sm:w-24">
                                                        <div class="text-[10px] mb-0.5 sm:mb-1" x-text="(p.p_win * 100).toFixed(1) + '%'"></div>
                                                        <div class="progress-bar hidden sm:block" aria-hidden="true">
                                                            <div class="progress-fill" :style="'width: ' + (p.p_win * 100) + '%; background-color: ' + getProbColor(p.p_win * 100)"></div>
                                                        </div>
                                                    </div>
                                                </td>
                                                <!-- Top 3 % -->
                                                <td class="px-0.5 pt-2 sm:pt-4 px-0.5 sm:px-4 align-top">
                                                    <div class="w-10 sm:w-24">
                                                        <div class="text-[10px] mb-0.5 sm:mb-1" x-text="(p.p_top3 * 100).toFixed(1) + '%'"></div>
                                                        <div class="progress-bar hidden sm:block" aria-hidden="true">
                                                            <div class="progress-fill" :style="'width: ' + (p.p_top3 * 100) + '%; background-color: ' + getProbColor(p.p_top3 * 100)"></div>
                                                        </div>
                                                    </div>
                                                </td>
                                                <!-- DNF % -->
                                                <td class="px-0.5 pt-2 sm:pt-4 px-0.5 sm:px-4 text-right align-top">
                                                    <div class="w-10 sm:w-24 ml-auto">
                                                        <div class="text-[10px] mb-0.5 sm:mb-1" x-text="(p.p_dnf * 100).toFixed(1) + '%'"></div>
                                                        <div class="progress-bar hidden sm:block" aria-hidden="true">
                                                            <div class="progress-fill" :style="'width: ' + (p.p_dnf * 100) + '%; background-color: ' + getProbColor(p.p_dnf * 100, true)"></div>
                                                        </div>
                                                    </div>
                                                </td>
                                            </tr>
                                            <!-- Influence panel — now in its own row, spanning all columns -->
                                            <tr :class="getTeamClass(p.constructorName)" x-show="p.ensemble_components || hasShapFactors(p.shap_values)">
                                                <td colspan="7" class="px-2 sm:px-12 pb-3 border-t border-gray-800/50">
                                                    <div class="flex flex-wrap md:flex-nowrap gap-x-8 gap-y-4 items-start">
                                                        <!-- Model Mix bar -->
                                                        <template x-if="p.ensemble_components">
                                                            <div class="md:w-44 md:flex-shrink-0">
                                                                <div class="text-[9px] font-bold text-gray-500 uppercase tracking-widest mb-0.5">Model Mix</div>
                                                                <div class="flex items-center gap-0.5 h-2 rounded overflow-hidden w-36 sm:w-44" aria-hidden="true">
                                                                    <div class="h-full bg-cyan-500"   :style="'width:' + (p.ensemble_components.gbm   * 100).toFixed(1) + '%'" :title="'GBM '           + (p.ensemble_components.gbm   * 100).toFixed(0) + '%'"></div>
                                                                    <div class="h-full bg-yellow-400" :style="'width:' + (p.ensemble_components.elo   * 100).toFixed(1) + '%'" :title="'Elo '           + (p.ensemble_components.elo   * 100).toFixed(0) + '%'"></div>
                                                                    <div class="h-full bg-purple-500" :style="'width:' + (p.ensemble_components.bt    * 100).toFixed(1) + '%'" :title="'Bradley-Terry ' + (p.ensemble_components.bt    * 100).toFixed(0) + '%'"></div>
                                                                    <div class="h-full bg-green-400"  :style="'width:' + (p.ensemble_components.mixed * 100).toFixed(1) + '%'" :title="'Mixed-Effects ' + (p.ensemble_components.mixed * 100).toFixed(0) + '%'"></div>
                                                                </div>
                                                                <div class="flex gap-2 mt-0.5 flex-wrap">
                                                                    <span class="text-[9px] text-cyan-400"><span class="inline-block w-1.5 h-1.5 rounded-full bg-cyan-500 mr-0.5 align-middle"></span>GBM <span x-text="(p.ensemble_components.gbm * 100).toFixed(0) + '%'"></span></span>
                                                                    <span class="text-[9px] text-yellow-400"><span class="inline-block w-1.5 h-1.5 rounded-full bg-yellow-400 mr-0.5 align-middle"></span>Elo <span x-text="(p.ensemble_components.elo * 100).toFixed(0) + '%'"></span></span>
                                                                    <span class="text-[9px] text-purple-400"><span class="inline-block w-1.5 h-1.5 rounded-full bg-purple-500 mr-0.5 align-middle"></span>BT <span x-text="(p.ensemble_components.bt * 100).toFixed(0) + '%'"></span></span>
                                                                    <span class="text-[9px] text-green-400"><span class="inline-block w-1.5 h-1.5 rounded-full bg-green-400 mr-0.5 align-middle"></span>Mix <span x-text="(p.ensemble_components.mixed * 100).toFixed(0) + '%'"></span></span>
                                                                </div>
                                                            </div>
                                                        </template>
                                                        <!-- SHAP factors -->
                                                        <template x-if="hasShapFactors(p.shap_values)">
                                                            <div class="min-w-0">
                                                                <div class="text-[9px] font-bold text-gray-500 uppercase tracking-widest mb-0.5">
                                                                    Factors <span class="normal-case font-normal text-gray-600">(green = helps, red = hurts)</span>
                                                                </div>
                                                                <div class="flex flex-nowrap gap-x-1.5 sm:gap-x-2 gap-y-0.5 overflow-x-auto no-scrollbar">
                                                                    <template x-for="feat in getSortedShap(p.shap_values)" :key="feat.key">
                                                                        <div class="flex items-center flex-shrink-0 gap-0.5 text-[8px] sm:text-[9px]">
                                                                            <span class="sr-only" x-text="feat.val < 0 ? 'Improves position:' : 'Worsens position:'"></span>
                                                                            <span aria-hidden="true" :class="feat.val < 0 ? 'text-green-400' : 'text-red-400'" class="font-bold w-2 text-center" x-text="feat.val < 0 ? '▲' : '▼'"></span>
                                                                            <div class="w-6 sm:w-10 h-1.5 bg-gray-700 rounded overflow-hidden" aria-hidden="true">
                                                                                <div class="h-full rounded" :class="feat.val < 0 ? 'bg-green-500' : 'bg-red-500'" :style="'width:' + Math.min(100, feat.absPct).toFixed(0) + '%'"></div>
                                                                            </div>
                                                                            <span class="text-gray-400" x-text="feat.label"></span>
                                                                        </div>
                                                                    </template>
                                                                </div>
                                                            </div>
                                                        </template>
                                                    </div>
                                                </td>
                                            </tr>
                                        </tbody>
                                    </template>
                                </table>

                                <div class="mt-3 rounded border border-gray-700 bg-gray-900/40 p-3">
                                    <div class="text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-2">Influence Legend</div>
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 text-[11px] text-gray-300">
                                        <div>
                                            <div class="font-semibold text-gray-200 mb-1">Model Mix (ensemble blend)</div>
                                            <div class="space-y-0.5">
                                                <div><span class="text-cyan-400 font-semibold">GBM</span> = The AI Brain. Analyzes complex patterns like weather and recent momentum to predict raw speed.</div>
                                                <div><span class="text-yellow-400 font-semibold">Elo</span> = The Skill Score. Like in Chess, this rating goes up when beating strong rivals and down when losing.</div>
                                                <div><span class="text-purple-400 font-semibold">BT</span> = Head-to-Head Ranker. Determines strength by seeing who consistently finishes ahead of their rivals.</div>
                                                <div><span class="text-green-400 font-semibold">Mix</span> = The Talent Separator. Mathematically separates a driver's personal skill from the car's performance.</div>
                                            </div>
                                        </div>
                                        <div>
                                            <div class="font-semibold text-gray-200 mb-1">Factor Impact Direction</div>
                                            <div aria-hidden="true"><span class="text-green-400 font-semibold">▲ Green</span> = improves predicted finish (helps).</div>
                                            <div aria-hidden="true"><span class="text-red-400 font-semibold">▼ Red</span> = worsens predicted finish (hurts).</div>
                                            <div class="sr-only">Green indicates factors that improve predicted finish (helps), while Red indicates factors that worsen predicted finish (hurts).</div>
                                            <div class="mt-1 text-gray-400">Bar length shows relative influence magnitude for that driver.</div>
                                        </div>
                                    </div>
                                    <details class="mt-3 border-t border-gray-700 pt-2">
                                        <summary class="cursor-pointer text-[10px] font-bold uppercase tracking-widest text-gray-400 hover:text-gray-200 focus:outline-none focus-visible:ring-2 focus-visible:ring-gray-400 rounded transition">Input Variable Glossary</summary>
                                        <div class="mt-2 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-x-4 gap-y-1 text-[10px]">
                                            <template x-for="entry in getFeatureLegendEntries()" :key="entry.key">
                                                <div class="flex justify-between gap-2 text-gray-300 border-b border-gray-800/60 pb-0.5">
                                                    <span class="truncate" x-text="entry.label"></span>
                                                    <span class="text-gray-500 font-mono" x-text="entry.key"></span>
                                                </div>
                                            </template>
                                        </div>
                                    </details>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>
            </div>

            <!-- Empty State -->
            <div x-show="!results && !loading" class="flex flex-col items-center justify-center py-20 text-gray-500">
                <i class="fas fa-flag-checkered text-6xl mb-4 opacity-20" aria-hidden="true"></i>
                <p class="text-xl font-light">Select a race and run prediction to start</p>
            </div>
        </main>

        <footer class="mt-auto py-8 text-center text-gray-600 text-xs uppercase tracking-widest">
            &copy; 2024 F1 Outcome Predictor • Built with FastAPI & AI
        </footer>
    </div>

    <script>
        function f1App() {
            return {
                loading: false,
                scheduleLoading: false,
                config: {},
                seasons: [],
                schedule: [],
                eventSessions: [],
                statusLoading: false,
                params: {
                    season: '',
                    round: '',
                    sessions: []
                },
                results: null,
                activeSession: null,
                error: null,
                logs: [],
                currentLog: 'Initializing',

                async refreshData() {
                    this.params.season = '';
                    this.params.round = '';
                    this.params.sessions = [];
                    this.results = null;
                    this.activeSession = null;
                    await this.init();
                },

                async init() {
                    try {
                        // Load Config
                        const configResp = await fetch('/api/config');
                        if (!configResp.ok) throw new Error(`HTTP ${configResp.status}`);
                        this.config = await configResp.json();
                        this.params.sessions = this.config.default_sessions || ['qualifying', 'race'];

                        // Load Seasons
                        const seasonsResp = await fetch('/api/seasons');
                        if (!seasonsResp.ok) throw new Error(`HTTP ${seasonsResp.status}`);
                        this.seasons = await seasonsResp.json();

                        // Pre-select if available
                        if (this.config.next_event) {
                            this.params.season = this.config.next_event.season || '';
                            await this.fetchSchedule();
                            this.params.round = this.config.next_event.round || '';
                            await this.fetchEventStatus();
                        }
                    } catch (e) {
                        console.error("Failed to initialize app", e);
                        this.error = "Failed to initialize application data. Check your connection.";
                    }
                },

                async fetchSchedule() {
                    if (!this.params.season) {
                        this.schedule = [];
                        return;
                    }
                    this.scheduleLoading = true;
                    try {
                        const resp = await fetch(`/api/schedule/${this.params.season}`);
                        if (!resp.ok) {
                            const text = await resp.text();
                            throw new Error(`HTTP ${resp.status}: ${text}`);
                        }
                        const data = await resp.json();
                        this.schedule = data.races || [];
                        // Reset round if current round is not in new schedule
                        if (!this.schedule.some(r => r.round == this.params.round)) {
                            this.params.round = '';
                            this.eventSessions = [];
                        } else {
                             await this.fetchEventStatus();
                        }
                    } catch (e) {
                        console.error("Failed to fetch schedule", e);
                    } finally {
                        this.scheduleLoading = false;
                    }
                },

                async fetchEventStatus() {
                    this.eventSessions = [];
                    this.results = null;
                    if (!this.params.season || !this.params.round) {
                        return;
                    }
                    this.statusLoading = true;
                    try {
                        const resp = await fetch(`/api/event-status/${this.params.season}/${this.params.round}`);
                        if (!resp.ok) {
                            const text = await resp.text();
                            throw new Error(`HTTP ${resp.status}: ${text}`);
                        }
                        const data = await resp.json();
                        this.eventSessions = data.sessions || [];

                        // Auto-select sessions that don't have results yet
                        // AND include the most recent session that HAS results
                        const lastWithResults = [...this.eventSessions].reverse().find(s => s.has_results);

                        const toSelect = this.eventSessions
                            .filter(s => !s.has_results)
                            .map(s => s.id);

                        if (lastWithResults) {
                            toSelect.unshift(lastWithResults.id);
                        }

                        if (toSelect.length > 0) {
                            this.params.sessions = toSelect;
                        } else if (this.eventSessions.length > 0) {
                            // If all have results, just select the main ones or none
                            this.params.sessions = [this.eventSessions[this.eventSessions.length - 1].id];
                        }
                    } catch (e) {
                        console.error("Failed to fetch event status", e);
                    } finally {
                        this.statusLoading = false;
                    }
                },

                toggleSession(s) {
                    if (this.params.sessions.includes(s)) {
                        this.params.sessions = this.params.sessions.filter(x => x !== s);
                    } else {
                        this.params.sessions.push(s);
                    }
                },

                async runPrediction() {
                    this.loading = true;
                    this.error = null;
                    this.results = null;
                    this.logs = [];
                    this.currentLog = 'Starting prediction engine';

                    try {
                        const queryParams = new URLSearchParams();
                        if (this.params.season) queryParams.append('season', this.params.season);
                        if (this.params.round) queryParams.append('round', this.params.round);
                        this.params.sessions.forEach(s => queryParams.append('sessions', s));

                        const response = await fetch(`/api/predict/stream?${queryParams.toString()}`);
                        if (!response.ok) {
                            const err = await response.json();
                            throw new Error(err.detail || "Prediction failed");
                        }

                        const reader = response.body.getReader();
                        const decoder = new TextDecoder();
                        let buffer = '';

                        while (true) {
                            const { value, done } = await reader.read();
                            if (done) break;

                            buffer += decoder.decode(value, { stream: true });
                            const lines = buffer.split('\n');
                            buffer = lines.pop();

                            for (const line of lines) {
                                if (line.startsWith('data: ')) {
                                    try {
                                        const payload = JSON.parse(line.substring(6));
                                        if (payload.type === 'log') {
                                            if (this.currentLog && this.currentLog !== payload.message) {
                                                this.logs.push(this.currentLog);
                                            }
                                            this.currentLog = payload.message;
                                            this.$nextTick(() => {
                                                const container = document.getElementById('log-container');
                                                if (container) container.scrollTop = container.scrollHeight;
                                            });
                                        } else if (payload.type === 'results') {
                                            this.results = payload.data;
                                        } else if (payload.type === 'error') {
                                            throw new Error(payload.message);
                                        }
                                    } catch (e) {
                                        console.error("Failed to parse SSE message", e);
                                    }
                                }
                            }
                        }

                        if (this.results && this.results.sessions) {
                            this.activeSession = Object.keys(this.results.sessions)[0];
                        } else if (!this.error) {
                            throw new Error("No results received from server");
                        }
                    } catch (e) {
                        this.error = e.message;
                    } finally {
                        this.loading = false;
                    }
                },

                getTeamClass(team) {
                    if (!team) return '';
                    const t = team.toLowerCase();
                    if (t.includes('ferrari')) return 'team-ferrari';
                    if (t.includes('red bull')) return 'team-red-bull';
                    if (t.includes('mercedes')) return 'team-mercedes';
                    if (t.includes('mclaren')) return 'team-mclaren';
                    if (t.includes('aston martin')) return 'team-aston-martin';
                    if (t.includes('alpine')) return 'team-alpine';
                    if (t.includes('williams')) return 'team-williams';
                    if (t.includes('haas')) return 'team-haas';
                    if (t.includes('sauber') || t.includes('kick')) return 'team-sauber';
                    if (t.includes('rb') || t.includes('racing bulls')) return 'team-rb';
                    return '';
                },

                getProbColor(val, isDnf = false) {
                    if (isDnf) {
                        if (val < 5) return '#10b981'; // Green
                        if (val < 15) return '#f59e0b'; // Amber
                        return '#ef4444'; // Red
                    }
                    if (val < 10) return '#4b5563'; // Gray
                    if (val < 40) return '#06b6d4'; // Cyan
                    if (val < 70) return '#10b981'; // Green
                    return '#f59e0b'; // Amber
                },

                hasGrid(sess) {
                    return sess === 'race' || sess === 'sprint';
                },

                // Feature name → human-readable label map (mirrors _FEATURE_LABELS in predict.py)
                _featureLabels: {
                    form_index:                  'Race Form',
                    qualifying_form_index:        'Quali Form',
                    driver_team_form_index:       'Driver-Team Fit',
                    team_form_index:              'Team Strength',
                    teammate_delta:               'vs Teammate',
                    grid_finish_delta:            'Overtaking Skill',
                    circuit_avg_pos:              'Circuit History',
                    circuit_dnf_rate:             'Circuit DNF Rate',
                    circuit_experience:           'Circuit Experience',
                    circuit_overtake_difficulty:  'Pass Difficulty',
                    global_circuit_dnf_rate:      'Track DNF Rate',
                    grid:                         'Grid Position',
                    current_quali_pos:            'Quali Position',
                    weather_effect:               'Weather Impact',
                    weather_beta_temp:            'Temp Sensitivity',
                    weather_beta_pressure:        'Pressure Sensitivity',
                    weather_beta_wind:            'Wind Sensitivity',
                    weather_beta_rain:            'Rain Sensitivity',
                    temp_skill:                   'Temp Skill',
                    rain_skill:                   'Rain Skill',
                    wind_skill:                   'Wind Skill',
                    pressure_skill:               'Pressure Skill',
                    weather_temp_mean:            'Air Temp',
                    weather_rain_sum:             'Rain Total',
                    weather_wind_mean:            'Wind Speed',
                    weather_pressure_mean:        'Air Pressure',
                    weather_humidity_mean:        'Humidity',
                    team_tenure_events:           'Team Tenure',
                    is_race:                      'Race Session',
                    is_qualifying:                'Quali Session',
                    is_sprint:                    'Sprint Session',
                    constructorId:                'Constructor',
                },

                _normalizeShap(shapValues) {
                    if (!shapValues) return {};

                    if (typeof shapValues === 'string') {
                        try {
                            const parsed = JSON.parse(shapValues);
                            return (parsed && typeof parsed === 'object' && !Array.isArray(parsed)) ? parsed : {};
                        } catch (_) {
                            return {};
                        }
                    }

                    if (Array.isArray(shapValues)) {
                        const firstObj = shapValues.find(v => v && typeof v === 'object' && !Array.isArray(v));
                        return firstObj || {};
                    }

                    if (typeof shapValues === 'object') {
                        return shapValues;
                    }

                    return {};
                },

                hasShapFactors(shapValues) {
                    const normalized = this._normalizeShap(shapValues);
                    const hiddenFeats = ["form_index", "qualifying_form_index", "grid", "is_race", "is_qualifying", "is_sprint"];
                    const visibleKeys = Object.keys(normalized).filter(k => !hiddenFeats.includes(k));
                    return visibleKeys.length > 0;
                },

                getFeatureLegendEntries() {
                    return Object.entries(this._featureLabels)
                        .map(([key, label]) => ({ key, label }))
                        .sort((a, b) => a.label.localeCompare(b.label));
                },

                // Returns sorted SHAP feature array for a driver, with labels and
                // percentage-of-max magnitude (for bar width scaling).
                getSortedShap(shapValues) {
                    const normalized = this._normalizeShap(shapValues);
                    const hiddenFeats = ["form_index", "qualifying_form_index", "grid", "is_race", "is_qualifying", "is_sprint"];
                    const entries = Object.entries(normalized)
                        .filter(([key, _]) => !hiddenFeats.includes(key))
                        .map(([key, val]) => {
                            const numVal = Number(val);
                            return {
                                key,
                                val: Number.isFinite(numVal) ? numVal : 0,
                                absVal: Math.abs(Number.isFinite(numVal) ? numVal : 0),
                                label: this._featureLabels[key] || key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase())
                            };
                        })
                        // Filter out features with exactly 0.0 influence to avoid confusing empty bars
                        .filter(e => e.absVal > 0)
                        .sort((a, b) => b.absVal - a.absVal)
                        .slice(0, 5);

                    const maxAbs = (entries.length > 0 && entries[0].absVal > 0) ? entries[0].absVal : 1;
                    return entries.map(e => ({ ...e, absPct: (e.absVal / maxAbs) * 100 }));
                }
            }
        }
    </script>
